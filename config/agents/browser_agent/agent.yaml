id: browser_agent
name: 浏览器任务 Agent
type: react_worker
description: 面向网页访问、页面信息提取、浏览器自动化和网页流程检查的专家 Agent。
version: "1"
enabled: true
mode: react
system_prompt_file: system_prompt.md
capabilities:
  - browser
  - web
  - extraction
tools:
  - name: mcp_local:*browser*
    description: 本地浏览器或网页工具。
  - name: mcp_local:*web*
    description: 本地网页访问工具。
  - name: mcp_world:*browser*
    description: 外部浏览器自动化工具。
  - name: mcp_world:*web*
    description: 外部网页访问工具。
metadata:
  owner: core
  role: specialist
  keywords:
    - 浏览器
    - 网页
    - 页面
    - 自动化
memory:
  read:
    - task_history
  write: []
permissions:
  can_write_files: false
  can_run_shell: false
  can_access_network: true
  require_approval_for: []
output:
  format: markdown
