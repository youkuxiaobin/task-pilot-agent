id: code_agent
name: 代码任务 Agent
type: react_worker
description: 面向代码阅读、代码修改、脚本执行、测试验证和开发任务的专家 Agent。
version: "1"
enabled: false
mode: react
system_prompt_file: system_prompt.md
capabilities:
  - code
  - test
  - sandbox
tools:
  - name: code_interpreter
    description: 在任务工作目录内执行代码或测试。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: "*file*"
    description: 文件读取、写入和产物处理工具。
metadata:
  owner: core
  role: specialist
  keywords:
    - 代码
    - 测试
    - 脚本
    - 修复
memory:
  read:
    - task_history
  write: []
permissions:
  can_write_files: true
  can_run_shell: false
  can_access_network: false
  require_approval_for:
    - high_risk_tools
output:
  format: markdown
  required_sections:
    - 修改内容
    - 验证结果
    - 风险
