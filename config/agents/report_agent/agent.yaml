id: report_agent
name: 报告生成 Agent
type: react_worker
description: 面向报告、总结、结构化文档、HTML/PPT/Markdown 产物生成的专家 Agent。
version: "1"
enabled: false
mode: react
system_prompt_file: system_prompt.md
capabilities:
  - report
  - writing
  - artifact
tools:
  - name: web_search
    description: 搜索报告需要的公开资料和来源。
  - name: fetch_url
    description: 读取报告引用来源的网页正文。
  - name: report
    description: 生成报告类产物。
  - name: "*report*"
    description: 本地报告生成工具。
  - name: "*file*"
    description: 文件写入和产物处理工具。
metadata:
  owner: core
  role: specialist
  keywords:
    - 报告
    - 文档
    - 总结
    - PPT
memory:
  read:
    - task_history
  write: []
permissions:
  can_write_files: true
  can_run_shell: false
  can_access_network: true
  require_approval_for: []
output:
  format: markdown
  required_sections:
    - 摘要
    - 正文
    - 产物
