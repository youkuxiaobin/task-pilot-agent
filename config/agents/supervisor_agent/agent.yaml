id: supervisor_agent
name: 通用任务总控 Agent
type: supervisor
description: 面向通用问题解决的主 Agent，适合搜索研究、文件处理、数据分析、浏览器任务、报告生成和自动化流程。
version: "1"
enabled: true
mode: react
system_prompt_file: system_prompt.md
model:
  context: executor
  max_steps: 8
capabilities:
  - route
  - plan
  - use_tools
  - review_progress
tools:
  - name: builtin:plan_tool
    description: 用于维护计划、步骤状态和下一步动作。
    input_schema:
      type: object
      properties:
        command:
          type: string
          enum:
            - create
            - continue
            - get_plan
            - update
            - add_step
            - mark_step
            - skip_step
            - finish
        steps:
          type: array
          items:
            type: string
        step:
          type: string
        position:
          type: integer
        current_step:
          type: string
        step_index:
          type: integer
        status:
          type: string
          enum:
            - running
            - completed
            - failed
            - waiting_input
            - skipped
        note:
          type: string
        evidence:
          type: array
          items:
            type: object
      required:
        - command
    output_schema:
      type: object
      properties:
        message:
          type: string
        plan:
          type: object
  - name: builtin:set_todo_list
    description: 把当前计划或短期步骤投影成用户可见的 TODO 进度卡片。
    input_schema:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              status:
                type: string
                enum:
                  - not_started
                  - running
                  - waiting
                  - blocked
                  - completed
                  - failed
            required:
              - title
        summary:
          type: string
        current_index:
          type: integer
      required:
        - items
    output_schema:
      type: object
      properties:
        message:
          type: string
        todoList:
          type: object
  - name: builtin:handoff
    description: 把子任务交给 handoffs.allowed 中声明的目标 Agent。
    input_schema:
      type: object
      properties:
        target_agent_id:
          type: string
          description: 目标 Agent ID，必须在 handoffs.allowed 中。
        task:
          type: string
          description: 要交给目标 Agent 的任务内容。
        mode:
          type: string
          description: 可选运行模式。
        outputStyle:
          type: string
          description: 可选输出样式。
      required:
        - target_agent_id
        - task
    output_schema:
      type: object
      properties:
        taskId:
          type: string
          description: 子任务 ID。
        status:
          type: string
          description: 子任务状态。
  - name: builtin:request_input
    description: 缺少关键信息时，请求用户补充输入并让任务进入等待输入状态。
    input_schema:
      type: object
      properties:
        prompt:
          type: string
          description: 展示给用户的问题或补充说明。
        reason:
          type: string
          description: 为什么必须等待用户补充。
      required:
        - prompt
    output_schema:
      type: object
      properties:
        status:
          type: string
          description: waiting_input。
        taskId:
          type: string
          description: 当前任务 ID。
  - name: code_interpreter
    description: 执行代码，默认需要显式打开高风险工具开关。
    input_schema:
      type: object
      properties:
        code:
          type: string
          description: 要执行的代码。
      required:
        - code
    output_schema:
      type: object
      properties:
        result:
          type: string
          description: 执行结果或错误摘要。
        files:
          type: array
          description: 任务产物列表。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: process_command_*
    description: 管理长生命周期命令行进程，默认需要显式打开高风险工具开关。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: config_update
    description: 修改运行配置，默认需要显式打开高风险工具开关。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: mcp_manager_add_server
    description: 修改 MCP Server 配置，默认需要显式打开高风险工具开关。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: create_subagent
    description: 创建子 Agent 配置；注册到运行时需要显式打开高风险工具开关。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: skill_install
    description: 安装任务本地技能说明。
    policy:
      risk: medium
  - name: file_*
    description: 本地文件读写、搜索和产物处理工具。
  - name: directory_create
    description: 创建任务工作目录内的目录。
  - name: web_*
    description: 本地网页搜索和读取工具。
  - name: fetch_url
    description: 读取指定 URL 的页面正文。
  - name: get_*weather*
    description: 天气查询工具。
  - name: browser_agent
    description: 本地浏览器任务 Agent 工具。
  - name: audio_tool
    description: 音频理解工具。
  - name: image_tool
    description: 图片理解工具。
  - name: video_tool
    description: 视频理解工具。
  - name: text_to_image
    description: 文本生成图片工具。
  - name: report
    description: 报告生成工具。
  - name: config_read
    description: 配置读取工具。
  - name: mcp_manager_list_servers
    description: MCP Server 列表工具。
  - name: mcp_manager_write_manifest
    description: MCP 配置导出工具。
  - name: message_send
    description: 消息发送工具。
  - name: skill_search
    description: 技能搜索工具。
  - name: skill_load
    description: 技能加载工具。
  - name: memory_*
    description: 长期记忆显式操作工具。
  - name: mcp_world:*
    description: 外部扩展工具。
handoffs:
  allowed:
    - task-pilot-agent
memory:
  read:
    - user_profile
    - task_history
  write:
    - research_findings
permissions:
  can_write_files: true
  can_run_shell: false
  can_access_network: true
  require_approval_for:
    - high_risk_tools
output:
  format: markdown
  required_sections:
    - 结论
    - 过程
    - 下一步
metadata:
  owner: core
  role: supervisor
