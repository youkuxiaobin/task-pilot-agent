id: supervisor_agent
name: 通用任务总控 Agent
type: supervisor
description: 面向通用问题解决的主 Agent，适合搜索研究、文件处理、数据分析、浏览器任务、报告生成和自动化流程。
version: "1"
enabled: true
mode: react
system_prompt_file: system_prompt.md
model:
  context: executor
  max_steps: 8
capabilities:
  - route
  - plan
  - use_tools
  - review_progress
tools:
  - name: builtin:plan_tool
    description: 用于维护计划、步骤状态和下一步动作。
    input_schema:
      type: object
      properties:
        command:
          type: string
          enum:
            - create
            - continue
            - update
            - finish
        steps:
          type: array
          items:
            type: string
        current_step:
          type: string
      required:
        - command
    output_schema:
      type: object
      properties:
        message:
          type: string
        plan:
          type: object
  - name: builtin:handoff
    description: 把子任务交给 handoffs.allowed 中声明的目标 Agent。
    input_schema:
      type: object
      properties:
        target_agent_id:
          type: string
          description: 目标 Agent ID，必须在 handoffs.allowed 中。
        task:
          type: string
          description: 要交给目标 Agent 的任务内容。
        mode:
          type: string
          description: 可选运行模式。
        outputStyle:
          type: string
          description: 可选输出样式。
      required:
        - target_agent_id
        - task
    output_schema:
      type: object
      properties:
        taskId:
          type: string
          description: 子任务 ID。
        status:
          type: string
          description: 子任务状态。
  - name: mcp_local:code_interpreter
    description: 执行代码，默认需要显式打开高风险工具开关。
    input_schema:
      type: object
      properties:
        code:
          type: string
          description: 要执行的代码。
      required:
        - code
    output_schema:
      type: object
      properties:
        result:
          type: string
          description: 执行结果或错误摘要。
        files:
          type: array
          description: 任务产物列表。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: mcp_local:*
    description: 本地内置工具。
  - name: mcp_world:*
    description: 外部扩展工具。
handoffs:
  allowed:
    - task-pilot-agent
    - search_agent
    - browser_agent
    - data_agent
    - code_agent
    - report_agent
memory:
  read:
    - user_profile
    - task_history
  write:
    - research_findings
permissions:
  can_write_files: true
  can_run_shell: false
  can_access_network: true
  require_approval_for:
    - high_risk_tools
output:
  format: markdown
  required_sections:
    - 结论
    - 过程
    - 下一步
metadata:
  owner: core
  role: supervisor
