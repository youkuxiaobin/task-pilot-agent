cases:
  - id: research_summary
    name: 搜索研究摘要
    input: 汇总一个新技术主题的关键信息，并给出引用依据。
    expected: 应先检索或调用搜索工具，再给出带依据的摘要。
    tags: [research, search, citation]
    metadata:
      checks:
        final_status: completed
        required_event_types: [agent_started, tool_call, result, task_completed]

  - id: file_analysis
    name: 文件分析
    input: 读取用户上传的数据文件，找出异常值并生成结论。
    expected: 应读取文件、分析数据，并把结果作为任务产物或最终答案返回。
    tags: [file, data, artifact]
    metadata:
      checks:
        final_status: completed
        required_event_types: [agent_started, tool_call, result, task_completed]
        min_artifacts: 1

  - id: plan_then_execute
    name: 复杂任务规划
    input: 把一个多步骤自动化任务拆解、执行并在中途根据结果调整计划。
    expected: 应调用 builtin:plan_tool 维护计划，并记录工具调用过程。
    tags: [planning, tool, regression]
    metadata:
      checks:
        final_status: completed
        required_event_types: [agent_started, tool_call, plan, result, task_completed]

  - id: browser_workflow
    name: 浏览器任务
    input: 打开一个网页，提取页面上的关键信息，并把过程和结果写入任务时间线。
    expected: 应使用浏览器或网页类工具完成访问、提取和结果记录；失败时应保留可回看的错误原因。
    tags: [browser, web, tool, regression]
    metadata:
      checks:
        final_status: completed
        required_event_types: [agent_started, tool_call, result, task_completed]

  - id: code_analysis
    name: 代码执行与数据分析
    input: 使用代码处理一小段结构化数据，计算汇总指标，并说明计算步骤。
    expected: 应在允许策略下调用代码或数据分析工具，记录工具调用和结果，最终答案包含计算结论。
    tags: [code, data, sandbox, regression]
    metadata:
      checks:
        final_status: completed
        required_event_types: [agent_started, tool_call, tool_result, result, task_completed]

  - id: report_generation
    name: 报告生成
    input: 基于给定主题生成一份结构清晰的报告，并把报告作为最终结果或任务产物返回。
    expected: 应调用报告或文件产物相关能力，任务详情中能看到产物、最终答案和生成过程。
    tags: [report, artifact, file, regression]
    metadata:
      checks:
        final_status: completed
        required_event_types: [agent_started, tool_call, result, task_completed]
        min_artifacts: 1
