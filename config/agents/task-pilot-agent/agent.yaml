id: task-pilot-agent
name: TaskPilot 默认 Agent
type: plan_solve_worker
description: 默认兼容 Agent，保持现有计划执行流程。
version: "1"
enabled: true
mode: plans_executor
system_prompt_file: system_prompt.md
model:
  context: legacy
  max_steps: 20
capabilities:
  - plan
  - execute
  - summarize
tools:
  - name: mcp_local:code_interpreter
    description: 执行代码，默认需要显式打开高风险工具开关。
    input_schema:
      type: object
      properties:
        code:
          type: string
          description: 要执行的代码。
      required:
        - code
    output_schema:
      type: object
      properties:
        result:
          type: string
          description: 执行结果或错误摘要。
        files:
          type: array
          description: 任务产物列表。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: "mcp_*:*"
    description: 允许使用当前工具市场中可用的 MCP 工具。
metadata:
  owner: core
  compatibility: legacy
memory:
  read:
    - task_history
  write: []
permissions:
  can_write_files: true
  can_run_shell: false
  can_access_network: true
  require_approval_for:
    - high_risk_tools
output:
  format: markdown
