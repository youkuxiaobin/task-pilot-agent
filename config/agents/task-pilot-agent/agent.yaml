id: task-pilot-agent
name: TaskPilot 默认 Agent
type: react_worker
description: 默认通用 Agent，使用 ReAct 循环直接推理、调用工具并总结结果。
version: "1"
enabled: true
mode: react
system_prompt_file: system_prompt.md
model:
  context: react
  max_steps: 6
capabilities:
  - react
  - use_tools
  - summarize
tools:
  - name: builtin:plan_tool
    description: 复杂问题需要拆步骤、跟踪进度或失败后调整时，用它维护计划。
    input_schema:
      type: object
      properties:
        command:
          type: string
          enum:
            - create
            - continue
            - get_plan
            - update
            - add_step
            - mark_step
            - skip_step
            - finish
        steps:
          type: array
          items:
            type: string
        step:
          type: string
        position:
          type: integer
        current_step:
          type: string
        step_index:
          type: integer
        status:
          type: string
          enum:
            - running
            - completed
            - failed
            - waiting_input
            - skipped
        note:
          type: string
        evidence:
          type: array
          items:
            type: object
      required:
        - command
    output_schema:
      type: object
      properties:
        message:
          type: string
        plan:
          type: object
  - name: builtin:set_todo_list
    description: 把当前计划或短期步骤投影成用户可见的 TODO 进度卡片。
    input_schema:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              status:
                type: string
                enum:
                  - not_started
                  - running
                  - waiting
                  - blocked
                  - completed
                  - failed
            required:
              - title
        summary:
          type: string
        current_index:
          type: integer
      required:
        - items
    output_schema:
      type: object
      properties:
        message:
          type: string
        todoList:
          type: object
  - name: mcp_local:file_read
    description: 读取 Linux/macOS/Windows 本机文件内容。
  - name: mcp_local:file_list
    description: 列出目录内容。
  - name: mcp_local:file_stat
    description: 查看文件或目录基础信息。
  - name: mcp_local:file_write
    description: 在任务工作目录内写入文本文件。
  - name: mcp_local:directory_create
    description: 在任务工作目录内创建目录。
  - name: mcp_local:file_copy
    description: 复制文件到任务工作目录。
  - name: mcp_local:file_move
    description: 移动或重命名任务工作目录内的文件。
  - name: mcp_local:file_delete
    description: 删除任务工作目录内的文件或目录。
  - name: mcp_local:code_interpreter
    description: 执行代码，默认需要显式打开高风险工具开关。
    input_schema:
      type: object
      properties:
        code:
          type: string
          description: 要执行的代码。
      required:
        - code
    output_schema:
      type: object
      properties:
        result:
          type: string
          description: 执行结果或错误摘要。
        files:
          type: array
          description: 任务产物列表。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: mcp_local:shell_exec
    description: 执行本机 Shell 命令，默认需要显式打开高风险工具开关。
    policy:
      risk: high
      requires_explicit_enable: true
  - name: "mcp_*:*"
    description: 允许使用当前工具市场中可用的 MCP 工具。
denied_tools:
  - mcp_local:deepsearch
metadata:
  owner: core
  compatibility: legacy
memory:
  read:
    - task_history
  write: []
permissions:
  can_write_files: true
  can_run_shell: false
  can_access_network: true
  require_approval_for:
    - high_risk_tools
output:
  format: markdown
