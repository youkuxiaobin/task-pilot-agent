<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>TaskPilot 控制台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --bg-app: #f5f7fb;
      --bg-sidebar: #ffffff;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-soft: #eef2f7;
      --text-main: #172033;
      --text-muted: #667085;
      --text-faint: #98a2b3;
      --border: #d8dee8;
      --border-soft: #e8edf4;
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.06);
      --shadow-md: 0 12px 32px rgba(16, 24, 40, 0.10);
      --color-plan: #3157d5;
      --color-tool: #00876f;
      --color-task: #b45508;
      --color-thought: #7a3eb1;
      --color-error: #d92d20;
      --color-accent: #0b7189;
      --radius-md: 8px;
      --radius-lg: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    [hidden] { display: none !important; }
    html, body { height: 100%; }
    body {
      background: var(--bg-app);
      color: var(--text-main);
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button, input, select, textarea { font: inherit; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, summary:focus-visible {
      outline: 2px solid rgba(11, 113, 137, 0.35);
      outline-offset: 2px;
    }

    .app-layout { display: flex; width: 100%; height: 100%; }
    .sidebar {
      width: 304px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.24s ease;
      z-index: 40;
    }
    .sidebar-header {
      padding: 1.1rem 1rem 1rem;
      border-bottom: 1px solid var(--border-soft);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      color: var(--text-main);
      font-size: 1.05rem;
      font-weight: 750;
      letter-spacing: 0;
      margin-bottom: 0.95rem;
    }
    .brand::before {
      content: "";
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background:
        linear-gradient(135deg, rgba(11, 113, 137, 0.95), rgba(0, 135, 111, 0.95));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
      flex: 0 0 auto;
    }
    .btn-new {
      width: 100%;
      padding: 0.68rem 0.85rem;
      border: 1px solid #0b7189;
      border-radius: var(--radius-md);
      background: #0b7189;
      color: #ffffff;
      font-weight: 650;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
      box-shadow: var(--shadow-sm);
    }
    .btn-new:hover { background: #075f75; border-color: #075f75; }
    .btn-new:active { transform: translateY(1px); }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-height: 0;
    }
    .session-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      min-height: 42px;
      padding: 0.62rem 0.72rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-muted);
      transition: background 0.16s ease, color 0.16s ease;
      font-size: 0.9rem;
      line-height: 1.35;
    }
    .session-item > span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-item:hover { background: #f0f4f8; color: var(--text-main); }
    .session-item.active {
      background: #e8f5f7;
      color: #073f4d;
      font-weight: 650;
      box-shadow: inset 3px 0 0 var(--color-accent);
    }
    .session-del {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      opacity: 0;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .session-item:hover .session-del { opacity: 1; }
    .session-del:hover { color: var(--color-error); background: rgba(217, 45, 32, 0.08); }
    .sidebar-section {
      border-top: 1px solid var(--border-soft);
      padding: 0.95rem;
      flex: 0 0 auto;
      max-height: 42vh;
      display: flex;
      flex-direction: column;
      min-height: 184px;
    }
    .sidebar-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 750;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.72rem;
    }
    .btn-small {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text-muted);
      border-radius: 7px;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      transition: border-color 0.16s ease, color 0.16s ease, background 0.16s ease;
    }
    .btn-small:hover { color: var(--text-main); border-color: #b8c3d1; background: #f8fafc; }
    .task-filters { display: grid; gap: 0.45rem; margin-bottom: 0.75rem; }
    .filter-input, .filter-select, .select-style {
      width: 100%;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text-main);
      border-radius: 7px;
      padding: 0.46rem 0.58rem;
      font-size: 0.82rem;
    }
    .filter-input::placeholder, textarea::placeholder { color: var(--text-faint); }
    .filter-select option, .select-style option { background: #ffffff; color: var(--text-main); }
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      overflow-y: auto;
      min-height: 0;
    }
    .task-item {
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 0.68rem;
      background: #ffffff;
      cursor: pointer;
      transition: border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }
    .task-item:hover {
      border-color: rgba(11, 113, 137, 0.34);
      background: #fbfdff;
      box-shadow: var(--shadow-sm);
    }
    .task-item.active {
      border-color: rgba(11, 113, 137, 0.5);
      background: #edf9fb;
    }
    .task-item-title {
      color: var(--text-main);
      font-size: 0.86rem;
      line-height: 1.38;
      margin-bottom: 0.45rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-item-meta {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.72rem;
      gap: 0.45rem;
    }
    .task-item-meta span:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .task-status {
      border-radius: 999px;
      padding: 0.14rem 0.48rem;
      background: #eef2f7;
      color: #475467;
      font-weight: 650;
      line-height: 1.3;
    }
    .task-status.completed { background: #e8f7f1; color: #047857; }
    .task-status.failed { background: #fff0ed; color: #c2410c; }
    .task-status.cancelled { background: #f2f4f7; color: #667085; }
    .task-status.running, .task-status.queued, .task-status.waiting_input, .task-status.waiting_approval { background: #fff7e6; color: #a15c07; }
    .task-empty {
      color: var(--text-muted);
      font-size: 0.84rem;
      line-height: 1.45;
      padding: 0.6rem 0.2rem;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.84), rgba(245,247,251,0.96) 42%),
        linear-gradient(90deg, rgba(11,113,137,0.08), rgba(0,135,111,0.05));
    }
    .top-bar {
      min-height: 64px;
      padding: 0.85rem 1.35rem;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
      z-index: 10;
    }
    .sidebar-toggle {
      display: none;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text-main);
      border-radius: 7px;
      width: 34px;
      height: 34px;
      font-size: 1rem;
      cursor: pointer;
    }
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.56rem;
      min-width: 0;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 600;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #98a2b3;
      box-shadow: 0 0 0 3px rgba(152, 162, 179, 0.14);
      transition: background 0.2s ease, box-shadow 0.2s ease;
      flex: 0 0 auto;
    }
    .status-dot.active {
      background: #12b76a;
      box-shadow: 0 0 0 4px rgba(18, 183, 106, 0.16);
    }
    .task-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      min-width: 0;
      flex: 1;
    }
    .task-actions[hidden] { display: none; }
    .task-meta {
      color: var(--text-muted);
      font-size: 0.8rem;
      max-width: min(58vw, 760px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-filter-select {
      width: auto;
      min-width: 116px;
      max-width: 164px;
      padding: 0.36rem 0.5rem;
      font-size: 0.78rem;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.35rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
    }
    .chat-empty {
      width: min(740px, 100%);
      margin: 9vh auto 0;
      color: var(--text-muted);
      text-align: left;
      padding: 1.5rem 0;
    }
    .chat-empty h2 {
      color: var(--text-main);
      font-size: clamp(1.9rem, 4vw, 3.15rem);
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: 0;
      margin-bottom: 0.85rem;
    }
    .chat-empty p { font-size: 1rem; line-height: 1.6; max-width: 540px; }

    .msg-row {
      display: flex;
      gap: 0.78rem;
      max-width: 920px;
      margin: 0 auto;
      width: 100%;
      align-items: flex-start;
    }
    .msg-row.user { flex-direction: row-reverse; max-width: 760px; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 1rem;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }
    .avatar.ai {
      background: #ffffff;
      border: 1px solid var(--border-soft);
      color: var(--color-accent);
    }
    .avatar.user { background: #172033; color: #ffffff; }
    .bubble {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.62rem;
    }
    .msg-row.user .bubble {
      flex: 0 1 auto;
      max-width: min(620px, 100%);
    }
    .msg-row.user .bubble-content {
      background: #172033;
      color: #ffffff;
      padding: 0.78rem 1rem;
      border-radius: 10px 10px 2px 10px;
      font-size: 0.98rem;
      line-height: 1.58;
      box-shadow: var(--shadow-sm);
    }
    .msg-row.user .markdown-body code { background: rgba(255,255,255,0.16); color: #ffffff; }
    .result-content {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow-sm);
      font-size: 0.98rem;
      line-height: 1.72;
    }

    .markdown-body { width: 100%; overflow-wrap: anywhere; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      margin-top: 1.35em;
      margin-bottom: 0.55em;
      font-weight: 720;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .markdown-body h1 { font-size: 1.45em; border-bottom: 1px solid var(--border-soft); padding-bottom: 0.34em; }
    .markdown-body h2 { font-size: 1.25em; }
    .markdown-body h3 { font-size: 1.08em; }
    .markdown-body p { margin-bottom: 0.9em; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.35em; margin-bottom: 0.9em; }
    .markdown-body blockquote {
      border-left: 3px solid var(--color-accent);
      padding-left: 0.85em;
      color: var(--text-muted);
      margin: 0.9em 0;
    }
    .markdown-body pre {
      background: #111827;
      color: #e5e7eb;
      padding: 0.9rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid #202938;
      margin: 0.9em 0;
      line-height: 1.55;
    }
    .markdown-body code {
      font-family: "SF Mono", Consolas, ui-monospace, monospace;
      background: #eef2f7;
      color: #27364a;
      padding: 0.15em 0.36em;
      border-radius: 5px;
      font-size: 0.9em;
    }
    .markdown-body pre code { background: transparent; padding: 0; border-radius: 0; color: inherit; }
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      border: 1px solid var(--border);
      font-size: 0.93em;
      background: #ffffff;
    }
    .markdown-body th {
      background: #f1f5f9;
      font-weight: 700;
      text-align: left;
      padding: 0.65rem;
      border: 1px solid var(--border);
    }
    .markdown-body td { padding: 0.58rem 0.65rem; border: 1px solid var(--border); }
    .markdown-body tr:nth-child(even) { background: #fafcff; }
    .markdown-body a { color: var(--color-accent); }

    details.agent-card {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      box-shadow: var(--shadow-sm);
    }
    details.agent-card:hover { border-color: #cbd5e1; }
    details.agent-card[open] { background: #ffffff; }
    summary.card-header {
      list-style: none;
      min-height: 42px;
      padding: 0.62rem 0.78rem;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.88rem;
      font-weight: 700;
      user-select: none;
      transition: background 0.16s ease;
    }
    summary.card-header::-webkit-details-marker { display: none; }
    summary.card-header:hover { background: #f8fafc; }
    details.agent-card.type-plan { border-left: 3px solid var(--color-plan); }
    details.agent-card.type-plan summary { color: var(--color-plan); }
    details.agent-card.type-tool { border-left: 3px solid var(--color-tool); }
    details.agent-card.type-tool summary { color: var(--color-tool); }
    details.agent-card.type-thought { border-left: 3px solid var(--color-thought); }
    details.agent-card.type-thought summary { color: var(--color-thought); }
    details.agent-card.type-task { border-left: 3px solid var(--color-task); }
    details.agent-card.type-task summary { color: var(--color-task); }
    details.agent-card.compact {
      box-shadow: none;
      background: rgba(255, 255, 255, 0.72);
    }
    details.agent-card.compact summary.card-header {
      min-height: 34px;
      padding: 0.42rem 0.62rem;
      font-size: 0.8rem;
      font-weight: 650;
    }
    details.agent-card.compact:not([open]) {
      opacity: 0.82;
    }
    .card-icon { width: 1.2em; text-align: center; font-size: 1em; }
    .card-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-time { font-size: 0.74rem; color: var(--text-faint); font-weight: 600; }
    .card-arrow { transition: transform 0.16s ease; opacity: 0.52; color: var(--text-muted); }
    details[open] .card-arrow { transform: rotate(90deg); }
    .card-body {
      padding: 0.9rem;
      border-top: 1px solid var(--border-soft);
      font-size: 0.9rem;
      color: var(--text-main);
      line-height: 1.62;
      background: #fbfcfe;
    }
    .card-body.markdown-body { padding: 0.9rem; }
    .technical-details {
      margin-top: 0.65rem;
      border-top: 1px dashed var(--border);
      padding-top: 0.55rem;
      color: var(--text-muted);
    }
    .technical-details summary {
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .step-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.42rem; }
    .step-item {
      display: flex;
      gap: 0.65rem;
      align-items: flex-start;
      padding: 0.48rem 0.55rem;
      border-radius: 7px;
      background: #ffffff;
      border: 1px solid var(--border-soft);
    }
    .step-item.completed { color: var(--text-muted); }
    .step-item.completed .step-icon { color: var(--color-tool); font-weight: 750; }
    .step-item.pending { color: var(--text-main); font-weight: 600; }
    .step-item.error { color: var(--color-error); }
    .step-icon { font-family: "SF Mono", Consolas, ui-monospace, monospace; min-width: 1.25em; }
    .field-block { margin-bottom: 0.88rem; text-align: left; }
    .field-block:last-child { margin-bottom: 0; }
    .field-label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.32rem;
      font-weight: 800;
    }
    .field-value {
      color: var(--text-main);
      line-height: 1.55;
      white-space: pre-wrap;
      font-family: "SF Mono", Consolas, ui-monospace, monospace;
      font-size: 0.84rem;
      background: #ffffff;
      padding: 0.62rem;
      border-radius: 7px;
      border: 1px solid var(--border-soft);
      overflow-x: auto;
    }
    .field-value.highlight { border-left: 3px solid var(--color-accent); }

    .thinking-bubble {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.7rem 0.82rem;
      background: #ffffff;
      border: 1px solid var(--border-soft);
      border-radius: 9px;
      border-bottom-left-radius: 2px;
      box-shadow: var(--shadow-sm);
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      background-color: var(--color-accent);
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out both;
      opacity: 0.72;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    .task-input-panel {
      border-top: 1px solid #f2d6a6;
      background: #fff8ea;
      padding: 0.8rem 1.35rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .task-input-panel[hidden] { display: none; }
    .task-input-panel textarea {
      flex: 1;
      min-height: 42px;
      max-height: 120px;
      resize: vertical;
      border: 1px solid #e4bc75;
      border-radius: 8px;
      background: #ffffff;
      color: var(--text-main);
      padding: 0.62rem 0.75rem;
    }
    .composer-area {
      background: rgba(255, 255, 255, 0.78);
      border-top: 1px solid var(--border-soft);
      padding: 1rem 1.35rem 1.2rem;
      z-index: 20;
      backdrop-filter: blur(12px);
    }
    .composer-box {
      width: min(920px, 100%);
      margin: 0 auto;
      background: var(--bg-input);
      border: 1px solid #cbd5e1;
      border-radius: var(--radius-lg);
      padding: 0.55rem;
      box-shadow: var(--shadow-md);
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }
    .composer-box:focus-within {
      border-color: rgba(11, 113, 137, 0.65);
      box-shadow: 0 14px 38px rgba(11, 113, 137, 0.14);
    }
    textarea#query {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 1rem;
      line-height: 1.55;
      padding: 0.78rem 0.88rem;
      resize: none;
      min-height: 56px;
      max-height: 200px;
    }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      padding: 0.58rem 0.7rem 0.1rem;
      border-top: 1px solid var(--border-soft);
      margin-top: 0.25rem;
    }
    .settings-group { display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; min-width: 0; }
    .select-style {
      width: auto;
      min-width: 156px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .file-input { max-width: 160px; color: var(--text-muted); font-size: 0.78rem; }
    .file-summary {
      color: var(--text-muted);
      font-size: 0.78rem;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tool-picker { position: relative; }
    .tool-picker summary {
      list-style: none;
      min-width: 78px;
      text-align: center;
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.42rem 0.75rem;
      border-radius: 7px;
      font-size: 0.84rem;
      cursor: pointer;
    }
    .tool-picker summary::-webkit-details-marker { display: none; }
    .tool-options {
      position: absolute;
      left: 0;
      bottom: calc(100% + 0.5rem);
      width: min(380px, 84vw);
      max-height: 300px;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem;
      z-index: 30;
      box-shadow: var(--shadow-md);
    }
    .tool-option {
      display: flex;
      gap: 0.55rem;
      align-items: flex-start;
      padding: 0.52rem;
      border-radius: 7px;
      color: var(--text-main);
      font-size: 0.83rem;
      line-height: 1.36;
    }
    .tool-option:hover { background: #f8fafc; }
    .tool-option.disabled { opacity: 0.62; }
    .tool-option input { margin-top: 0.16rem; }
    .tool-option small { display: block; color: var(--text-muted); margin-top: 0.16rem; }
    .tool-risk { color: #b45508; font-size: 0.72rem; margin-left: 0.35rem; font-weight: 700; }
    .agent-summary {
      margin: 0.65rem 0.7rem 0;
      padding-top: 0.72rem;
      border-top: 1px solid var(--border-soft);
      display: grid;
      grid-template-columns: minmax(180px, 0.75fr) 1fr;
      gap: 0.8rem;
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .agent-summary[hidden] { display: none; }
    .agent-summary strong { color: var(--text-main); font-size: 0.92rem; }
    .agent-summary p { margin-top: 0.2rem; line-height: 1.45; }
    .agent-summary-line {
      display: flex;
      gap: 0.42rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.35rem;
    }
    .agent-pill {
      display: inline-flex;
      align-items: center;
      max-width: 190px;
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 0.15rem 0.5rem;
      color: #475467;
      background: #f8fafc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .agent-pill-label {
      color: var(--text-muted);
      background: transparent;
      border-color: transparent;
      padding-left: 0;
      font-weight: 700;
    }
    .btn-send {
      background: #0b7189;
      color: #ffffff;
      border: 1px solid #0b7189;
      padding: 0.52rem 1.08rem;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, opacity 0.16s ease, transform 0.16s ease;
      min-width: 74px;
    }
    .btn-send:hover { background: #075f75; border-color: #075f75; }
    .btn-send:active { transform: translateY(1px); }
    .btn-send:disabled { opacity: 0.48; cursor: not-allowed; transform: none; }
    .btn-stop {
      background: #ffffff;
      color: var(--color-error);
      border-color: rgba(217, 45, 32, 0.35);
      margin-right: 0.45rem;
    }
    .btn-stop:hover { background: #fff5f3; border-color: rgba(217, 45, 32, 0.55); color: #b42318; }

    @media (max-width: 900px) {
      .sidebar {
        position: absolute;
        height: 100%;
        transform: translateX(-100%);
        box-shadow: var(--shadow-md);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggle { display: inline-grid; place-items: center; }
      .top-bar { padding: 0.78rem 0.85rem; }
      .task-actions { flex: 0 1 auto; }
      .task-meta { max-width: 44vw; }
      .chat-container { padding: 1rem 0.85rem 1.2rem; }
      .msg-row, .msg-row.user { max-width: 100%; }
      .composer-area { padding: 0.75rem 0.85rem 0.9rem; }
      .agent-summary { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .top-bar { align-items: flex-start; flex-direction: column; gap: 0.55rem; }
      .task-actions { width: 100%; justify-content: flex-start; flex-wrap: wrap; }
      .task-meta { max-width: 100%; width: 100%; }
      .avatar { display: none; }
      .msg-row.user .bubble { max-width: 100%; }
      .result-content { padding: 0.9rem; }
      .task-input-panel { padding: 0.75rem 0.85rem; flex-direction: column; align-items: stretch; }
      .controls { align-items: stretch; flex-direction: column; }
      .settings-group { width: 100%; }
      .select-style { width: 100%; }
      .controls > div:last-child { display: flex; justify-content: flex-end; width: 100%; }
      .btn-send { min-width: 86px; }
      summary.card-header { grid-template-columns: auto minmax(0, 1fr) auto; }
      .card-time { display: none; }
    }
  </style>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">TaskPilot</div>
      <button id="new-session" class="btn-new" type="button">新建会话</button>
    </div>
    <div id="session-list" class="session-list"></div>
    <div class="sidebar-section">
      <div class="sidebar-title">
        <span>最近会话</span>
        <button id="refresh-tasks" class="btn-small" type="button" hidden>刷新</button>
      </div>
      <div class="task-filters" hidden>
        <input id="task-keyword" class="filter-input" type="search" placeholder="搜索会话">
        <input id="task-user-filter" class="filter-input" type="search" placeholder="用户 ID">
        <select id="task-status-filter" class="filter-select" title="运行状态">
          <option value="">全部状态</option>
          <option value="queued">排队中</option>
          <option value="running">运行中</option>
          <option value="waiting_input">等待输入</option>
          <option value="waiting_approval">等待审批</option>
          <option value="completed">已完成</option>
          <option value="failed">失败</option>
          <option value="cancelled">已取消</option>
        </select>
        <select id="task-agent-filter" class="filter-select" title="运行 Agent">
          <option value="">全部 Agent</option>
        </select>
        <select id="task-agent-type-filter" class="filter-select" title="Agent 类型">
          <option value="">全部类型</option>
        </select>
        <select id="task-created-filter" class="filter-select" title="创建时间">
          <option value="">全部时间</option>
          <option value="hour">最近 1 小时</option>
          <option value="today">今天</option>
          <option value="week">最近 7 天</option>
          <option value="month">最近 30 天</option>
        </select>
        <select id="task-duration-filter" class="filter-select" title="耗时">
          <option value="">全部耗时</option>
          <option value="short">1 秒内</option>
          <option value="medium">1-10 秒</option>
          <option value="long">10-60 秒</option>
          <option value="very-long">超过 60 秒</option>
        </select>
        <select id="task-error-filter" class="filter-select" title="错误状态">
          <option value="">全部错误状态</option>
          <option value="true">有错误</option>
          <option value="false">无错误</option>
        </select>
      </div>
      <div id="task-list" class="task-list">
        <div class="task-empty">暂无会话记录</div>
      </div>
    </div>
  </aside>

  <main class="workspace">
    <div class="top-bar">
      <div class="status-indicator">
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" title="会话列表">☰</button>
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">就绪</span>
      </div>
      <div id="task-actions" class="task-actions" hidden>
        <div id="task-meta" class="task-meta"></div>
        <select id="task-event-type-filter" class="filter-select event-filter-select" title="事件类型" hidden>
          <option value="">全部事件</option>
          <option value="tool_call,tool_result">工具调用</option>
          <option value="agent_phase">Agent 阶段</option>
          <option value="task_failed,agent_failed">失败事件</option>
          <option value="task_artifact_added">产物</option>
          <option value="eval_result">评测结果</option>
          <option value="memory_context_loaded">上下文检索</option>
        </select>
        <select id="task-event-source-filter" class="filter-select event-filter-select" title="事件来源" hidden>
          <option value="">全部来源</option>
          <option value="sse">SSE</option>
          <option value="autoagent">运行系统</option>
          <option value="agent">Agent</option>
          <option value="tool">工具</option>
        </select>
        <button id="retry-task" class="btn-small" type="button" hidden>重试</button>
      </div>
    </div>

    <div id="chat-messages" class="chat-container">
      <div class="chat-empty">
        <h2>TaskPilot 控制台</h2>
        <p>输入问题或需求，系统会在会话中展示执行过程、工具调用和最终结果。</p>
      </div>
    </div>

    <div id="task-input-panel" class="task-input-panel" hidden>
      <textarea id="task-input-text" placeholder="补充会话需要的信息..." rows="2"></textarea>
      <button id="send-task-input" class="btn-send" type="button">提交补充</button>
    </div>

    <div class="composer-area">
      <form id="request-form" class="composer-box">
        <textarea id="query" placeholder="输入问题或需求，按 Enter 发送" rows="1"></textarea>
        
        <div class="controls">
          <div class="settings-group">
            <select id="output-style" class="select-style" title="输出格式" hidden>
              <option value="markdown">Markdown</option>
              <option value="html">HTML</option>
              <option value="table">Table</option>
              <option value="ppt">PPT</option>
            </select>
            <select id="mode" class="select-style" title="运行模式" hidden>
              <option value="react">ReAct</option>
              <option value="plans_executor">Legacy Plan Executor</option>
            </select>
            <select id="run-environment" class="select-style" title="运行环境" hidden>
              <option value="local">本地环境</option>
              <option value="sandbox">沙箱环境</option>
            </select>
            <select id="agent-id" class="select-style" title="选择 Agent">
              <option value="">默认 Agent</option>
            </select>
            <details id="tool-picker" class="tool-picker" hidden>
              <summary id="tool-summary">工具</summary>
              <div id="tool-options" class="tool-options"></div>
            </details>
            <select id="eval-case" class="select-style" title="选择评测" hidden>
              <option value="">评测</option>
            </select>
            <button id="run-eval" class="btn-small" type="button" disabled hidden>运行评测</button>
            <button id="run-all-evals" class="btn-small" type="button" disabled hidden>全部评测</button>
            <input id="file-input" class="file-input" type="file" multiple title="上传文件" hidden>
            <span id="file-summary" class="file-summary" hidden></span>
            <input id="user-id" type="hidden" placeholder="User ID">
            <input id="endpoint" type="hidden" value="/agent/autoagent">
          </div>
          
          <div>
            <button id="stop" class="btn-send btn-stop" type="button" disabled>停止</button>
            <button id="send" class="btn-send" type="submit">发送</button>
          </div>
        </div>
        <div id="agent-summary" class="agent-summary" hidden></div>
      </form>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>

<script>
(() => {
  const dom = {
    sessionList: document.getElementById('session-list'),
    sidebar: document.querySelector('.sidebar'),
    sidebarToggle: document.getElementById('sidebar-toggle'),
    taskList: document.getElementById('task-list'),
    refreshTasks: document.getElementById('refresh-tasks'),
    taskKeyword: document.getElementById('task-keyword'),
    taskUserFilter: document.getElementById('task-user-filter'),
    taskStatusFilter: document.getElementById('task-status-filter'),
    taskAgentFilter: document.getElementById('task-agent-filter'),
    taskAgentTypeFilter: document.getElementById('task-agent-type-filter'),
    taskCreatedFilter: document.getElementById('task-created-filter'),
    taskDurationFilter: document.getElementById('task-duration-filter'),
    taskErrorFilter: document.getElementById('task-error-filter'),
    newSession: document.getElementById('new-session'),
    chatMessages: document.getElementById('chat-messages'),
    statusText: document.getElementById('status-text'),
    statusDot: document.getElementById('status-dot'),
    taskActions: document.getElementById('task-actions'),
    taskMeta: document.getElementById('task-meta'),
    taskEventTypeFilter: document.getElementById('task-event-type-filter'),
    taskEventSourceFilter: document.getElementById('task-event-source-filter'),
    retryTask: document.getElementById('retry-task'),
    taskInputPanel: document.getElementById('task-input-panel'),
    taskInputText: document.getElementById('task-input-text'),
    sendTaskInput: document.getElementById('send-task-input'),
    form: document.getElementById('request-form'),
    query: document.getElementById('query'),
    send: document.getElementById('send'),
    stop: document.getElementById('stop'),
    outputStyle: document.getElementById('output-style'),
    mode: document.getElementById('mode'),
    runEnvironment: document.getElementById('run-environment'),
    userId: document.getElementById('user-id'),
    agentId: document.getElementById('agent-id'),
    agentSummary: document.getElementById('agent-summary'),
    toolPicker: document.getElementById('tool-picker'),
    toolSummary: document.getElementById('tool-summary'),
    toolOptions: document.getElementById('tool-options'),
    evalCase: document.getElementById('eval-case'),
    runEval: document.getElementById('run-eval'),
    runAllEvals: document.getElementById('run-all-evals'),
    fileInput: document.getElementById('file-input'),
    fileSummary: document.getElementById('file-summary'),
    endpoint: document.getElementById('endpoint'),
  };

  const state = {
    sessions: [],
    activeSessionId: null,
    nextSessionIndex: 1,
    stream: null,
    running: false,
    tasks: [],
    agents: [],
    agentDiagnostics: null,
    agentListError: '',
    toolCatalog: {},
    defaultAgentId: '',
    activeTaskId: null,
    replaying: false,
    followLatest: true,
    pendingRender: false,
  };

  const markedLib = window.marked;
  if (markedLib?.setOptions) markedLib.setOptions({ breaks:true, gfm:true });
  const purifier = window.DOMPurify;
  let controller = null;
  let taskFilterTimer = null;

  const generateId = () => `sess_${Date.now().toString(36)}`;
  const getSession = id => state.sessions.find(s=>s.id===id);
  const getActiveSession = () => getSession(state.activeSessionId);
  const escapeHTML = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const PROCESS_HIDDEN_IN_CHAT = new Set(['plan_thought', 'tool_thought', 'stream']);
  const LOW_SIGNAL_TASK_PREFIXES = [
    '上下文检索已按 Agent 配置关闭',
    '上下文已检索',
    '运行边界已应用',
    '工具策略已应用',
    '运行中',
    'Agent 已启动',
    'Agent 已完成',
  ];

  function isChatNearBottom() {
    const el = dom.chatMessages;
    if(!el) return true;
    return el.scrollHeight - el.scrollTop - el.clientHeight < 96;
  }

  function hasChatTextSelection() {
    const selection = window.getSelection?.();
    if(!selection || selection.isCollapsed) return false;
    const node = selection.anchorNode || selection.focusNode;
    return !!(node && dom.chatMessages && dom.chatMessages.contains(node));
  }

  function markUserReading() {
    state.followLatest = isChatNearBottom();
  }

  function compactToolName(name) {
    return String(name || '').replace(/^mcp_local[:-]/, '').replace(/^mcp_[^:-]+[:-]/, '');
  }

  function isLowSignalTaskText(text) {
    const value = String(text || '').trim();
    return LOW_SIGNAL_TASK_PREFIXES.some(prefix => value.startsWith(prefix));
  }

  function createSession(extra={}){
    const s = { id: generateId(), title: `对话 ${state.nextSessionIndex++}`, messages: [], taskId: null, taskStatus: null, ...extra };
    state.sessions.push(s); 
    return s;
  }

  function activateSession(s){
    if(!s) return; 
    state.activeSessionId = s.id;
    state.activeTaskId = s.taskId || null;
    state.followLatest = true;
    state.pendingRender = false;
    renderSessionList();
    renderTaskList();
    updateTaskMeta(s);
    renderMessages(true);
    if(!state.running) setUIStatus('就绪', false);
    dom.query.focus();
  }

  function deleteSession(id){
    const idx = state.sessions.findIndex(s=>s.id===id);
    if(idx === -1) return;
    if(state.running && state.activeSessionId === id) onStop();
    state.sessions.splice(idx, 1);
    if(state.sessions.length === 0) activateSession(createSession());
    else if(state.activeSessionId === id) activateSession(state.sessions[Math.max(0, idx-1)]);
    else renderSessionList();
  }

  function renderSessionList(){
    dom.sessionList.innerHTML = '';
    state.sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = `session-item ${s.id === state.activeSessionId ? 'active' : ''}`;
      const title = escapeHTML(s.title);
      const taskLabel = s.taskId ? `<small style="display:block;color:var(--text-muted);margin-top:0.25rem">${escapeHTML(s.taskStatus || 'task')}</small>` : '';
      div.innerHTML = `<span>${title}${taskLabel}</span><span class="session-del">×</span>`;
      div.onclick = (e) => {
        if(e.target.classList.contains('session-del')) { e.stopPropagation(); deleteSession(s.id); }
        else if(!state.running) activateSession(s);
      };
      dom.sessionList.appendChild(div);
    });
  }

  function updateTaskMeta(session) {
    if(!session || !session.taskId) {
      dom.taskMeta.textContent = '';
      dom.taskActions.hidden = true;
      dom.taskEventTypeFilter.value = '';
      dom.taskEventSourceFilter.value = '';
      dom.taskEventTypeFilter.disabled = true;
      dom.taskEventSourceFilter.disabled = true;
      dom.retryTask.hidden = true;
      dom.retryTask.disabled = true;
      updateTaskInputPanel(null);
      return;
    }
    dom.taskActions.hidden = false;
    const usageText = formatUsageMeta(session.usage);
    const parts = [
      `运行 ${session.taskId}`,
      session.taskStatus || 'running',
      formatAgentSnapshotMeta(session.agentSnapshot) || session.taskAgentId,
      session.taskMode,
      session.runEnvironment ? `环境 ${session.runEnvironment}` : '',
      formatArtifactMeta(session.artifacts),
      usageText,
    ].filter(Boolean);
    dom.taskMeta.textContent = parts.join(' · ');
    dom.taskEventTypeFilter.disabled = state.running;
    dom.taskEventSourceFilter.disabled = state.running;
    dom.taskEventTypeFilter.value = session.eventTypeFilter || '';
    dom.taskEventSourceFilter.value = session.eventSourceFilter || '';
    const retryable = ['completed', 'failed', 'cancelled'].includes(session.taskStatus || '');
    dom.retryTask.hidden = !retryable;
    dom.retryTask.disabled = state.running || !retryable;
    updateTaskInputPanel(session);
  }

  function updateTaskInputPanel(session) {
    const waiting = Boolean(session?.taskId && session.taskStatus === 'waiting_input');
    dom.taskInputPanel.hidden = !waiting;
    dom.sendTaskInput.disabled = !waiting;
    if(!waiting) dom.taskInputText.value = '';
  }

  function renderTaskList() {
    if(!dom.taskList) return;
    if(!state.tasks.length) {
      dom.taskList.innerHTML = '<div class="task-empty">暂无会话记录</div>';
      return;
    }
    dom.taskList.innerHTML = '';
    state.tasks.forEach(task => {
      const item = document.createElement('div');
      const taskId = task.taskId || task.task_id;
      const status = task.status || '';
      item.className = `task-item ${taskId === state.activeTaskId ? 'active' : ''}`;
      item.innerHTML = `
        <div class="task-item-title">${escapeHTML(task.input || taskId)}</div>
        <div class="task-item-meta">
          <span class="task-status ${escapeHTML(status)}">${escapeHTML(status || 'unknown')}</span>
          <span>${formatDate(task.createdAt)}</span>
          <span>${formatDuration(task.durationMs)}</span>
        </div>`;
      item.onclick = () => {
        if(!state.running) {
          loadTask(taskId);
          dom.sidebar.classList.remove('open');
        }
      };
      dom.taskList.appendChild(item);
    });
  }

  function formatDate(ts) {
    if(!ts) return '';
    return new Date(Number(ts)).toLocaleString([], { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  function formatDuration(ms) {
    if(ms === null || ms === undefined || ms === '') return '';
    const value = Math.max(0, Number(ms) || 0);
    if(value < 1000) return `${value}ms`;
    if(value < 60000) return `${(value / 1000).toFixed(value < 10000 ? 1 : 0)}s`;
    return `${Math.round(value / 60000)}m`;
  }

  function formatUsageMeta(usage) {
    if(!usage || typeof usage !== 'object') return '';
    const parts = [];
    if(usage.toolCalls) parts.push(`工具 ${usage.toolCalls}`);
    if(usage.toolFailures) parts.push(`失败 ${usage.toolFailures}`);
    if(usage.toolDurationMs) parts.push(`工具耗时 ${formatDuration(usage.toolDurationMs)}`);
    return parts.join(' · ');
  }

  function formatAgentSnapshotMeta(snapshot) {
    if(!snapshot || typeof snapshot !== 'object') return '';
    const label = snapshot.name || snapshot.id || '';
    const typeText = [snapshot.type, snapshot.mode].filter(Boolean).join('/');
    const capabilities = Array.isArray(snapshot.capabilities) ? snapshot.capabilities.length : 0;
    const tools = Array.isArray(snapshot.tools) ? snapshot.tools.length : 0;
    return [
      label ? `Agent ${label}` : '',
      typeText,
      capabilities ? `能力 ${capabilities}` : '',
      tools ? `工具 ${tools}` : '',
    ].filter(Boolean).join(' · ');
  }

  function formatArtifactMeta(artifacts) {
    if(!Array.isArray(artifacts) || !artifacts.length) return '';
    const types = [...new Set(artifacts.map(item => item.mimeType || (item.isRemote ? 'remote' : 'file')).filter(Boolean))].slice(0, 3);
    return `产物 ${artifacts.length}${types.length ? ` (${types.join(', ')})` : ''}`;
  }

  function taskCreatedRange(value) {
    const now = Date.now();
    if(value === 'hour') return now - 60 * 60 * 1000;
    if(value === 'today') {
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      return start.getTime();
    }
    if(value === 'week') return now - 7 * 24 * 60 * 60 * 1000;
    if(value === 'month') return now - 30 * 24 * 60 * 60 * 1000;
    return null;
  }

  function applyDurationFilter(params, value) {
    if(value === 'short') params.set('max_duration_ms', '1000');
    else if(value === 'medium') {
      params.set('min_duration_ms', '1000');
      params.set('max_duration_ms', '10000');
    } else if(value === 'long') {
      params.set('min_duration_ms', '10000');
      params.set('max_duration_ms', '60000');
    } else if(value === 'very-long') {
      params.set('min_duration_ms', '60000');
    }
  }

  async function refreshTaskList() {
    try {
      const params = new URLSearchParams({ limit: '30' });
      const keyword = dom.taskKeyword.value.trim();
      const userId = dom.taskUserFilter.value.trim();
      if(keyword) params.set('keyword', keyword);
      if(userId) params.set('user_id', userId);
      if(dom.taskStatusFilter.value) params.set('status', dom.taskStatusFilter.value);
      if(dom.taskAgentFilter.value) params.set('agent_id', dom.taskAgentFilter.value);
      if(dom.taskAgentTypeFilter.value) params.set('agent_type', dom.taskAgentTypeFilter.value);
      const createdFrom = taskCreatedRange(dom.taskCreatedFilter.value);
      if(createdFrom !== null) params.set('created_from', String(createdFrom));
      applyDurationFilter(params, dom.taskDurationFilter.value);
      if(dom.taskErrorFilter.value) params.set('has_error', dom.taskErrorFilter.value);
      const resp = await fetch(`/agent/tasks?${params.toString()}`);
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      state.tasks = Array.isArray(data.items) ? data.items : [];
      renderTaskList();
    } catch(err) {
      dom.taskList.innerHTML = `<div class="task-empty">会话列表加载失败：${escapeHTML(err.message)}</div>`;
    }
  }

  async function refreshAgentList() {
    await refreshAgentDiagnostics();
    try {
      const resp = await fetch('/agent/agents');
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      state.agents = Array.isArray(data.items) ? data.items : [];
      state.defaultAgentId = data.defaultAgentId || '';
      state.agentListError = '';
      renderAgentOptions();
      renderTaskAgentFilter();
      renderTaskAgentTypeFilter();
    } catch(err) {
      state.agents = [];
      state.defaultAgentId = '';
      state.agentListError = err.message;
      renderAgentOptions();
      renderTaskAgentFilter();
      renderTaskAgentTypeFilter();
    }
  }

  async function refreshAgentDiagnostics() {
    try {
      const resp = await fetch('/agent/agents/diagnostics');
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      state.agentDiagnostics = await resp.json();
    } catch(err) {
      state.agentDiagnostics = {
        status: 'invalid',
        validCount: 0,
        invalidCount: 1,
        items: [{ agentId: 'agent_config', status: 'invalid', error: `配置诊断加载失败：${err.message}` }],
      };
    }
  }

  function renderAgentOptions() {
    const previous = dom.agentId.value;
    const defaultAgent = state.agents.find(agent => agent.id === state.defaultAgentId);
    dom.agentId.innerHTML = '';
    const defaultOption = document.createElement('option');
    defaultOption.value = state.defaultAgentId || '';
    defaultOption.textContent = defaultAgent ? `默认 Agent · ${defaultAgent.name || defaultAgent.id}` : '默认 Agent';
    defaultOption.dataset.mode = defaultAgent?.mode || '';
    dom.agentId.appendChild(defaultOption);
    state.agents.filter(agent => agent.id !== state.defaultAgentId).forEach(agent => {
      const option = document.createElement('option');
      option.value = agent.id;
      option.textContent = agent.name || agent.id;
      option.dataset.mode = agent.mode || '';
      dom.agentId.appendChild(option);
    });
    if(previous && (previous === state.defaultAgentId || state.agents.some(agent => agent.id === previous))) {
      dom.agentId.value = previous;
    } else if(state.defaultAgentId) {
      dom.agentId.value = state.defaultAgentId;
    }
    applySelectedAgentDefaults();
    renderAgentSummary();
  }

  function renderTaskAgentFilter() {
    const previous = dom.taskAgentFilter.value;
    dom.taskAgentFilter.innerHTML = '<option value="">全部 Agent</option>';
    state.agents.forEach(agent => {
      const option = document.createElement('option');
      option.value = agent.id;
      option.textContent = agent.name || agent.id;
      dom.taskAgentFilter.appendChild(option);
    });
    if(previous && state.agents.some(agent => agent.id === previous)) {
      dom.taskAgentFilter.value = previous;
    }
  }

  function renderTaskAgentTypeFilter() {
    const previous = dom.taskAgentTypeFilter.value;
    const types = [...new Set(state.agents.map(agent => agent.type).filter(Boolean))].sort();
    dom.taskAgentTypeFilter.innerHTML = '<option value="">全部类型</option>';
    types.forEach(type => {
      const option = document.createElement('option');
      option.value = type;
      option.textContent = type;
      dom.taskAgentTypeFilter.appendChild(option);
    });
    if(previous && types.includes(previous)) {
      dom.taskAgentTypeFilter.value = previous;
    }
  }

  function scheduleTaskRefresh() {
    if(taskFilterTimer) clearTimeout(taskFilterTimer);
    taskFilterTimer = setTimeout(refreshTaskList, 250);
  }

  function getSelectedAgentConfig() {
    const agentId = dom.agentId.value || state.defaultAgentId;
    return state.agents.find(agent => agent.id === agentId) || null;
  }

  function applySelectedAgentDefaults() {
    const selected = dom.agentId.selectedOptions[0];
    const mode = selected?.dataset?.mode;
    if(mode && Array.from(dom.mode.options).some(option => option.value === mode)) {
      dom.mode.value = mode;
    }
  }

  function limitedValues(values, limit=6) {
    const clean = values.filter(Boolean).map(value => String(value));
    if(clean.length <= limit) return clean;
    return [...clean.slice(0, limit), `+${clean.length - limit}`];
  }

  function renderPillLine(label, values) {
    const items = limitedValues(values);
    if(!items.length) return '';
    return `<div class="agent-summary-line"><span class="agent-pill agent-pill-label">${escapeHTML(label)}</span>${items.map(item => `<span class="agent-pill" title="${escapeHTML(item)}">${escapeHTML(item)}</span>`).join('')}</div>`;
  }

  function schemaFieldNames(schema) {
    if(!schema || typeof schema !== 'object') return [];
    const props = schema.properties && typeof schema.properties === 'object' ? Object.keys(schema.properties) : [];
    const required = Array.isArray(schema.required) ? schema.required.map(item => String(item)) : [];
    return limitedValues([...new Set([...required, ...props])], 5);
  }

  function renderToolSchemaLine(label, schema) {
    const fields = schemaFieldNames(schema);
    if(!fields.length) return '';
    return `<small>${escapeHTML(label)}：${fields.map(item => escapeHTML(item)).join(', ')}</small>`;
  }

  function toolBlockReasonText(reason) {
    const map = {
      denied_tools: '已在拒绝列表中',
      high_risk_requires_enable: '高风险工具需要本次勾选确认',
      high_risk_requires_approval: '高风险工具需要本次审批',
      tool_disabled: '工具已关闭',
      permission_can_run_shell: '当前 Agent 不允许执行命令',
      permission_can_access_network: '当前 Agent 不允许访问网络',
      permission_can_write_files: '当前 Agent 不允许写文件',
      not_in_allowed_tools: '不在允许工具列表中',
      not_selected: '本次运行未选择',
      blocked_by_policy: '被策略拦截',
    };
    return map[reason] || '';
  }

  function renderAgentSummary() {
    const agent = getSelectedAgentConfig();
    const diagnosticsHTML = renderAgentDiagnosticsHTML(agent?.id || state.defaultAgentId || '');
    const hasDiagnosticsProblem = state.agentDiagnostics?.status && state.agentDiagnostics.status !== 'ok';
    if(!hasDiagnosticsProblem) {
      dom.agentSummary.hidden = true;
      dom.agentSummary.innerHTML = '';
      return;
    }
    if(!agent) {
      dom.agentSummary.hidden = false;
      dom.agentSummary.innerHTML = diagnosticsHTML;
      return;
    }
    dom.agentSummary.hidden = false;
    dom.agentSummary.innerHTML = `
      <div>
        <strong>${escapeHTML(agent.name || agent.id)}</strong>
      </div>
      <div>
        ${diagnosticsHTML}
      </div>`;
  }

  function renderAgentDiagnosticsHTML(agentId='') {
    const diag = state.agentDiagnostics;
    if(!diag || typeof diag !== 'object') return '';
    const items = Array.isArray(diag.items) ? diag.items : [];
    const invalidItems = items.filter(item => item?.status === 'invalid');
    const selected = agentId ? items.find(item => item?.agentId === agentId) : null;
    const selectedError = selected?.status === 'invalid' ? selected.error : '';
    const summary = diag.status === 'ok'
      ? `配置检查通过：${diag.validCount || 0} 个 Agent`
      : `配置检查异常：${diag.invalidCount || invalidItems.length || 0} 个问题`;
    const details = selectedError || invalidItems.slice(0, 3).map(item => `${item.agentId || 'unknown'}：${item.error || ''}`).join('\n');
    const listError = state.agentListError ? `Agent 列表加载失败：${state.agentListError}` : '';
    return `
      <div class="agent-summary-line">
        <span class="agent-pill agent-pill-label">配置</span>
        <span class="agent-pill" title="${escapeHTML(details || listError || summary)}">${escapeHTML(summary)}</span>
      </div>
      ${details || listError ? `<small style="display:block;color:${diag.status === 'ok' ? 'var(--text-muted)' : 'var(--color-error)'};white-space:pre-wrap">${escapeHTML(details || listError)}</small>` : ''}`;
  }

  function renderToolOptions() {
    const agent = getSelectedAgentConfig();
    const catalogTools = agent?.id ? state.toolCatalog[agent.id] : null;
    const tools = Array.isArray(catalogTools) ? catalogTools : (Array.isArray(agent?.tools) ? agent.tools : []);
    dom.toolOptions.innerHTML = '';
    if(!tools.length) {
      dom.toolSummary.textContent = '工具';
      dom.toolOptions.innerHTML = '<div class="task-empty">暂无工具配置</div>';
      return;
    }
    tools.forEach(tool => {
      const name = tool.name || '';
      if(!name) return;
      const label = document.createElement('label');
      const allowed = tool.allowed !== false;
      const requiresApproval = tool.blockReason === 'high_risk_requires_enable' || tool.blockReason === 'high_risk_requires_approval';
      const selectable = allowed || requiresApproval;
      label.className = selectable ? 'tool-option' : 'tool-option disabled';
      const risk = String(tool.policy?.risk || '').toLowerCase();
      const badges = [];
      if(risk === 'high' || risk === 'critical') badges.push('高风险');
      if(requiresApproval) badges.push('需审批');
      else if(!allowed) badges.push('不可用');
      const riskHTML = badges.map(item => `<span class="tool-risk">${escapeHTML(item)}</span>`).join('');
      const schemaHTML = `${renderToolSchemaLine('输入', tool.inputSchema)}${renderToolSchemaLine('输出', tool.outputSchema)}`;
      const blockReason = !allowed ? toolBlockReasonText(tool.blockReason) : '';
      label.innerHTML = `
        <input type="checkbox" value="${escapeHTML(name)}" ${allowed ? 'checked' : ''} ${requiresApproval ? 'data-approval="high_risk"' : ''} ${selectable ? '' : 'disabled'}>
        <span>
          <strong>${escapeHTML(name)}</strong>${riskHTML}
          ${tool.description ? `<small>${escapeHTML(tool.description)}</small>` : ''}
          ${blockReason ? `<small>原因：${escapeHTML(blockReason)}</small>` : ''}
          ${schemaHTML}
        </span>`;
      dom.toolOptions.appendChild(label);
    });
    updateToolSummary();
    dom.toolOptions.querySelectorAll('input[type="checkbox"]').forEach(input => {
      input.addEventListener('change', updateToolSummary);
    });
  }

  async function refreshToolCatalog() {
    const agent = getSelectedAgentConfig();
    if(!agent?.id) return;
    try {
      const resp = await fetch(`/agent/tools?agent_id=${encodeURIComponent(agent.id)}`);
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      state.toolCatalog[agent.id] = Array.isArray(data.items) ? data.items.concat(Array.isArray(data.blockedTools) ? data.blockedTools : []) : [];
      if(getSelectedAgentConfig()?.id === agent.id) renderToolOptions();
    } catch(err) {
      delete state.toolCatalog[agent.id];
      renderToolOptions();
    }
  }

  function getSelectedTools() {
    const inputs = Array.from(dom.toolOptions.querySelectorAll('input[type="checkbox"]'));
    if(!inputs.length) return null;
    return inputs.filter(input => input.checked).map(input => input.value);
  }

  function getApprovedTools() {
    const inputs = Array.from(dom.toolOptions.querySelectorAll('input[type="checkbox"][data-approval="high_risk"]'));
    return inputs.filter(input => input.checked).map(input => input.value);
  }

  function updateToolSummary() {
    const inputs = Array.from(dom.toolOptions.querySelectorAll('input[type="checkbox"]'));
    if(!inputs.length) {
      dom.toolSummary.textContent = '工具';
      return;
    }
    const selected = inputs.filter(input => input.checked).length;
    dom.toolSummary.textContent = `工具 ${selected}/${inputs.length}`;
  }

  function updateFileSummary() {
    const files = Array.from(dom.fileInput.files || []);
    dom.fileSummary.textContent = files.length ? `${files.length} 个文件` : '';
  }

  async function uploadSelectedFiles(requestId) {
    const files = Array.from(dom.fileInput.files || []);
    const uploaded = [];
    for(const file of files) {
      const form = new FormData();
      form.append('request_id', requestId);
      form.append('file', file);
      const resp = await fetch('/file/v1/upload_file_form', { method: 'POST', body: form });
      if(!resp.ok) throw new Error(`文件上传失败：${file.name}`);
      const info = await resp.json();
      uploaded.push({
        fileName: info.file_name || file.name,
        description: '',
        ossUrl: info.download_url || '',
        domainUrl: info.preview_url || '',
        fileSize: info.file_size || file.size,
        isInternalFile: false,
      });
    }
    return uploaded;
  }

  function renderEvalOptions() {
    const agent = getSelectedAgentConfig();
    const evals = Array.isArray(agent?.evals) ? agent.evals : [];
    const previous = dom.evalCase.value;
    dom.evalCase.innerHTML = '<option value="">评测</option>';
    evals.forEach(item => {
      const option = document.createElement('option');
      option.value = item.id;
      option.textContent = item.name || item.id;
      dom.evalCase.appendChild(option);
    });
    if(previous && evals.some(item => item.id === previous)) {
      dom.evalCase.value = previous;
    }
    dom.runEval.disabled = !dom.evalCase.value;
    dom.runAllEvals.disabled = !evals.length;
  }

  async function runSelectedEval() {
    const agent = getSelectedAgentConfig();
    const caseId = dom.evalCase.value;
    if(!agent || !caseId || state.running) return;
    setUIStatus('启动评测...', true);
    try {
      const params = new URLSearchParams();
      if(dom.outputStyle.value) params.set('output_style', dom.outputStyle.value);
      if(dom.userId.value) params.set('user_id', dom.userId.value);
      const resp = await fetch(`/agent/agents/${encodeURIComponent(agent.id)}/evals/${encodeURIComponent(caseId)}/run?${params.toString()}`, { method: 'POST' });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const taskId = data.task?.taskId || data.eval?.taskId;
      await refreshTaskList();
      if(taskId) await loadTask(taskId);
      const session = getActiveSession() || createSession();
      upsertReasonMessage(session, 'notifications', renderNotificationHTML(`已启动评测运行：${taskId || '未知运行'}`), Date.now(), false);
    } catch(err) {
      const session = getActiveSession() || createSession();
      upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">启动评测失败：${escapeHTML(err.message)}</span>`, Date.now(), false);
    } finally {
      setUIStatus('就绪', false);
    }
  }

  async function runAllEvals() {
    const agent = getSelectedAgentConfig();
    const evals = Array.isArray(agent?.evals) ? agent.evals : [];
    if(!agent || !evals.length || state.running) return;
    setUIStatus('启动全部评测...', true);
    try {
      const params = new URLSearchParams();
      if(dom.outputStyle.value) params.set('output_style', dom.outputStyle.value);
      if(dom.userId.value) params.set('user_id', dom.userId.value);
      const resp = await fetch(`/agent/agents/${encodeURIComponent(agent.id)}/evals/run?${params.toString()}`, { method: 'POST' });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const items = Array.isArray(data.items) ? data.items : [];
      const taskId = items[0]?.task?.taskId || items[0]?.eval?.taskId;
      const taskIds = items.map(item => item?.task?.taskId || item?.eval?.taskId).filter(Boolean);
      await refreshTaskList();
      if(taskId) await loadTask(taskId);
      const session = getActiveSession() || createSession();
      const idText = taskIds.length ? `：${taskIds.join(', ')}` : '';
      upsertReasonMessage(session, 'notifications', renderNotificationHTML(`已启动 ${items.length} 个评测运行${idText}`), Date.now(), false);
    } catch(err) {
      const session = getActiveSession() || createSession();
      upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">启动全部评测失败：${escapeHTML(err.message)}</span>`, Date.now(), false);
    } finally {
      setUIStatus('就绪', false);
    }
  }

  function reloadActiveTaskEvents() {
    const session = getActiveSession();
    if(!session?.taskId || state.running) return;
    loadTask(session.taskId, {
      eventType: dom.taskEventTypeFilter.value,
      source: dom.taskEventSourceFilter.value,
    });
  }

  async function loadTask(taskId, eventFilters={}) {
    if(!taskId) return;
    setUIStatus('加载会话回看...', true);
    try {
      const eventType = eventFilters.eventType ?? dom.taskEventTypeFilter.value;
      const eventSource = eventFilters.source ?? dom.taskEventSourceFilter.value;
      const eventParams = new URLSearchParams({ limit: '10000' });
      if(eventType) eventParams.set('event_type', eventType);
      if(eventSource) eventParams.set('source', eventSource);
      const [taskResp, eventsResp, artifactsResp] = await Promise.all([
        fetch(`/agent/tasks/${encodeURIComponent(taskId)}`),
        fetch(`/agent/tasks/${encodeURIComponent(taskId)}/events?${eventParams.toString()}`),
        fetch(`/agent/tasks/${encodeURIComponent(taskId)}/artifacts`),
      ]);
      if(!taskResp.ok) throw new Error(`运行详情加载失败：${taskResp.status}`);
      if(!eventsResp.ok) throw new Error(`运行事件加载失败：${eventsResp.status}`);
      if(!artifactsResp.ok) throw new Error(`产物加载失败：${artifactsResp.status}`);
      const task = await taskResp.json();
      const eventsData = await eventsResp.json();
      const artifactsData = await artifactsResp.json();
      const existing = state.sessions.find(s => s.taskId === taskId);
      const session = existing || createSession({ id: `task_${taskId}`, title: `运行 ${String(taskId).slice(0, 8)}`, taskId });
      renderTaskToSession(session, task, eventsData.items || [], artifactsData.items || [], { eventType, source: eventSource });
      activateSession(session);
    } catch(err) {
      const session = getActiveSession() || createSession();
      upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">${escapeHTML(err.message)}</span>`, Date.now(), false);
    } finally {
      setUIStatus('就绪', false);
    }
  }

  function renderTaskToSession(session, task, events, artifacts=[], eventFilters={}) {
    session.taskId = task.taskId || task.task_id;
    session.taskStatus = task.status || '';
    session.taskAgentId = task.agentId || task.agent_id || '';
    session.taskMode = task.mode || '';
    session.runEnvironment = task.runEnvironment || task.metadata?.runEnvironment || '';
    session.usage = task.usage || task.metadata?.usage || null;
    session.agentSnapshot = task.metadata?.agentSnapshot || null;
    session.artifacts = artifacts;
    session.eventTypeFilter = eventFilters.eventType || '';
    session.eventSourceFilter = eventFilters.source || '';
    session.title = `运行 ${String(session.taskId).slice(0, 8)}`;
    session.messages = [];
    session.replayState = { sessionId: session.id, buffer: '', messageIndex: null, baseIndex: -1, lastIndexByKind: {}, gotAnyResult: false };
    if(task.input) {
      session.messages.push({ role: 'user', content: task.input });
      session.replayState.baseIndex = 0;
    }
    state.replaying = true;
    const agentSnapshotHTML = renderAgentSnapshotHTML(session.agentSnapshot);
    if(agentSnapshotHTML) {
      upsertReasonMessage(session, 'task', agentSnapshotHTML, task.createdAt || Date.now(), false);
    }
    if(task.hasError || task.status === 'failed') {
      const lastSuccess = lastSuccessfulEventText(events);
      const failureText = `失败原因：${task.error || '未知错误'}${lastSuccess ? `\n最后成功事件：${lastSuccess}` : ''}`;
      session.messages.push({ role: 'assistant', type: 'reason', kind: 'notifications', html: renderNotificationHTML(failureText), ts: Date.now(), isOpen: true });
    }

    events.forEach(item => {
      const payload = item.payload || {};
      const type = payload.messageType || mapTaskEventType(item.eventType);
      if(!type) return;
      const eventPayload = { ...payload, messageType: type };
      if(type === 'task' && !eventPayload.task) eventPayload.task = taskLifecycleText(item.eventType, payload);
      if(type === 'notifications' && !eventPayload.task) eventPayload.task = payload.error || taskLifecycleText(item.eventType, payload);
      applyEventToSession(session, { type, json: eventPayload, time: item.createdAt });
    });
    if(task.output && !session.replayState.gotAnyResult) {
      applyEventToSession(session, { type: 'result', json: { messageType: 'result', result: task.output }, time: task.endedAt || task.updatedAt });
    }
    if(artifacts.length) {
      upsertReasonMessage(session, 'file', renderArtifactsHTML(session.taskId, artifacts), task.endedAt || task.updatedAt || Date.now(), false);
    }
    state.replaying = false;
    state.activeTaskId = session.taskId;
    updateTaskMeta(session);
    renderMessages(true);
    renderTaskList();
  }

  function lastSuccessfulEventText(events) {
    const failedTypes = new Set(['task_failed', 'agent_failed', 'task_cancelled', 'task_cancel_requested']);
    for(let i = events.length - 1; i >= 0; i--) {
      const item = events[i] || {};
      const payload = item.payload || {};
      const resultMap = payload.resultMap || {};
      if(failedTypes.has(item.eventType)) continue;
      if(payload.error || payload.failed === true || resultMap.failed === true || resultMap.error) continue;
      const text = taskLifecycleText(item.eventType, payload);
      return text && text !== item.eventType ? `${item.eventType} · ${text}` : item.eventType;
    }
    return '';
  }

  function renderArtifactsHTML(taskId, artifacts) {
    return artifacts.map(item => {
      const href = `/agent/tasks/${encodeURIComponent(taskId)}/artifacts/${encodeURIComponent(item.artifactId)}`;
      const size = item.fileSize ? `${item.fileSize} bytes` : '';
      return `
        <div class="field-block">
          <span class="field-label">${escapeHTML(item.mimeType || 'file')} ${escapeHTML(size)}</span>
          <div class="field-value">
            <a style="color:var(--color-accent)" href="${href}" target="_blank" rel="noreferrer">${escapeHTML(item.filename || item.artifactId)}</a>
            ${item.description ? `<div style="margin-top:0.35rem;color:var(--text-muted)">${escapeHTML(item.description)}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function renderAgentSnapshotHTML(snapshot) {
    if(!snapshot || typeof snapshot !== 'object') return '';
    const capabilities = Array.isArray(snapshot.capabilities) ? snapshot.capabilities : [];
    const handoffs = Array.isArray(snapshot.handoffs?.allowed) ? snapshot.handoffs.allowed : [];
    const tools = Array.isArray(snapshot.tools) ? snapshot.tools.map(tool => {
      if(typeof tool === 'string') return tool;
      const name = tool?.name || tool?.id || '';
      if(!name) return '';
      const reason = tool.allowed === false ? toolBlockReasonText(tool.blockReason) || '不可用' : '';
      return reason ? `${name} (${reason})` : name;
    }).filter(Boolean) : [];
    let html = '';
    html += renderFieldBlock('Agent', [snapshot.name || snapshot.id, snapshot.type, snapshot.mode].filter(Boolean).join(' · '), {highlight: true});
    html += renderFieldBlock('Agent 说明', snapshot.description);
    html += renderPillLine('能力', capabilities);
    html += renderPillLine('工具', tools);
    html += renderPillLine('交接', handoffs);
    return html;
  }

  function mapTaskEventType(eventType) {
    if(eventType === 'task_failed') return 'notifications';
    if(eventType === 'task_cancel_requested' || eventType === 'task_cancelled') return 'notifications';
    if(eventType === 'agent_phase') return 'agent_phase';
    if(eventType === 'task_queued' || eventType === 'task_created' || eventType === 'task_resumed' || eventType === 'task_running' || eventType === 'task_completed' || eventType === 'task_waiting_approval' || eventType === 'waiting_input' || eventType === 'user_input' || eventType === 'task_resume_requested' || eventType === 'memory_context_loaded' || eventType === 'runtime_boundary_applied' || eventType === 'tool_policy_applied' || eventType === 'task_artifact_added' || eventType === 'task_retry_requested' || eventType === 'eval_run_created' || eventType === 'eval_result' || eventType === 'agent_selected' || eventType === 'agent_started' || eventType === 'agent_completed' || eventType === 'agent_failed' || eventType === 'agent_cancelled' || eventType === 'task_handoff_requested' || eventType === 'approval_requested' || eventType === 'approval_resolved') return 'task';
    return null;
  }

  function memoryContextSourceText(data) {
    const items = []
      .concat(Array.isArray(data.memoryResults) ? data.memoryResults : [])
      .concat(Array.isArray(data.ragResults) ? data.ragResults : []);
    const sources = [];
    items.forEach(item => {
      const meta = item?.metadata || {};
      const label = meta.title || meta.source_file || item?.id || item?.source || '';
      if(label && !sources.includes(label)) sources.push(String(label));
    });
    return sources.slice(0, 4).join(', ');
  }

  function taskLifecycleText(eventType, payload) {
    const data = payload?.resultMap && Object.keys(payload.resultMap).length ? payload.resultMap : (payload || {});
    if(eventType === 'task_created') {
      const tools = Array.isArray(data.selectedTools) ? data.selectedTools.join(', ') : '';
      const approved = Array.isArray(data.approvedTools) && data.approvedTools.length ? ` · 已授权 ${data.approvedTools.length} 个` : '';
      const env = data.runEnvironment ? ` · 环境：${data.runEnvironment}` : '';
      return `运行已创建：${data.mode || ''}${env}${tools ? ` · 工具：${tools}` : ''}${approved}`;
    }
    if(eventType === 'task_resumed') return `运行已恢复：${data.mode || ''}`;
    if(eventType === 'task_queued') return `运行排队中：${data.mode || ''}`;
    if(eventType === 'task_running') return '运行中';
    if(eventType === 'task_completed') return '运行已完成';
    if(eventType === 'task_failed') return `运行失败：${data.error || ''}`;
    if(eventType === 'task_cancel_requested') return '运行取消请求已发送';
    if(eventType === 'task_cancelled') return '运行已取消';
    if(eventType === 'task_retry_requested') return `运行已重试：${data.retryTaskId || ''}`;
    if(eventType === 'waiting_input') return `等待补充输入：${data.prompt || ''}`;
    if(eventType === 'task_waiting_approval') return '等待工具审批';
    if(eventType === 'approval_requested') return '需要审批工具';
    if(eventType === 'approval_resolved') return data.approved ? '已允许工具' : '已拒绝工具';
    if(eventType === 'user_input') return `用户补充：${data.content || ''}`;
    if(eventType === 'task_resume_requested') return '运行恢复请求已发送';
    if(eventType === 'memory_context_loaded') {
      if(data.memoryEnabled === false && data.ragEnabled === false) return '上下文检索已按 Agent 配置关闭';
      const memoryCount = Number(data.memoryCount || 0);
      const ragCount = Number(data.ragCount || 0);
      const warningCount = Number(data.warningCount || 0);
      const sources = memoryContextSourceText(data);
      return `上下文已检索：记忆 ${memoryCount} 条，知识库 ${ragCount} 条${sources ? ` · 来源：${sources}` : ''}${warningCount ? `，降级 ${warningCount} 项` : ''}`;
    }
    if(eventType === 'runtime_boundary_applied') {
      const env = data.runEnvironment || 'local';
      const rootCount = Array.isArray(data.writableRoots) ? data.writableRoots.length : 0;
      return `运行边界已应用：${env}${rootCount ? ` · 可写目录 ${rootCount} 个` : ''}`;
    }
    if(eventType === 'tool_policy_applied') {
      const available = Array.isArray(data.availableTools) ? data.availableTools.length : 0;
      const blocked = Array.isArray(data.blockedTools) ? data.blockedTools.length : 0;
      const approved = Array.isArray(data.approvedTools) ? data.approvedTools.length : 0;
      return `工具策略已应用：可用 ${available} 个，拦截 ${blocked} 个${approved ? `，本次授权 ${approved} 个` : ''}`;
    }
    if(eventType === 'task_artifact_added') return `产物已登记：${data.filename || data.artifactId || ''}`;
    if(eventType === 'eval_run_created') return `评测运行已创建：${data.caseId || ''}`;
    if(eventType === 'eval_result') {
      const status = data.status || (data.passed === true ? 'passed' : data.passed === false ? 'failed' : 'needs_review');
      const checkCount = Array.isArray(data.checks) ? data.checks.length : 0;
      return `评测结果：${status}${checkCount ? ` · 检查 ${checkCount} 项` : ''}`;
    }
    if(eventType === 'agent_phase') {
      const phaseNames = { planning: '规划', replanning: '重规划', execution: '执行', react: 'ReAct', summary: '总结' };
      const statusNames = { started: '开始', completed: '完成', failed: '失败', step_started: '步骤开始', step_completed: '步骤完成', step_failed: '步骤失败' };
      const phase = phaseNames[data.phase] || data.phase || 'Agent';
      const status = statusNames[data.status] || data.status || '';
      const step = data.stepIndex ? ` · ${data.stepIndex}/${data.totalSteps || ''}` : '';
      const command = data.command ? ` · ${data.command}` : '';
      const error = data.error ? ` · ${data.error}` : '';
      return `阶段${status}：${phase}${step}${command}${error}`;
    }
    if(eventType === 'agent_selected') return `Supervisor 已选择 Agent：${data.agentName || data.agentId || ''}${data.reason ? ` · ${data.reason}` : ''}`;
    if(eventType === 'agent_started') return `Agent 已启动：${data.agentName || data.agentId || ''}`;
    if(eventType === 'agent_completed') return `Agent 已完成：${data.agentName || data.agentId || ''}`;
    if(eventType === 'agent_failed') return `Agent 失败：${data.agentName || data.agentId || ''}${data.error ? ` · ${data.error}` : ''}`;
    if(eventType === 'agent_cancelled') return `Agent 已取消：${data.agentName || data.agentId || ''}`;
    if(eventType === 'task_handoff_requested') return `Agent 已交接：${data.parentAgentId || ''} -> ${data.targetAgentId || ''}`;
    return eventType || '';
  }

  function getBuildState(session) {
    if(state.stream && state.stream.sessionId === session.id) return state.stream;
    if(!session.replayState) {
      session.replayState = { sessionId: session.id, buffer: '', messageIndex: null, baseIndex: -1, lastIndexByKind: {}, gotAnyResult: false };
    }
    return session.replayState;
  }

  // --- 核心渲染 ---
  function renderMessages(scroll=false){
    const session = getActiveSession();
    if(scroll && state.running && hasChatTextSelection()) {
      state.pendingRender = true;
      return;
    }
    const shouldScrollToLatest = scroll && state.followLatest && !hasChatTextSelection();
    const previousScrollTop = dom.chatMessages.scrollTop;
    if(!session || (session.messages.length === 0 && !state.running)) {
      dom.chatMessages.innerHTML = `
        <div class="chat-empty">
          <h2>TaskPilot 控制台</h2>
          <p>输入问题或需求，系统会在会话中展示执行过程、工具调用和最终结果。</p>
        </div>`;
      return;
    }

    dom.chatMessages.innerHTML = '';
    
    // 聚合消息组
    const groups = [];
    let currentGroup = null;

    session.messages.forEach(msg => {
      const isUser = msg.role === 'user';
      if(!currentGroup || currentGroup.isUser !== isUser) {
        currentGroup = { isUser, messages: [] };
        groups.push(currentGroup);
      }
      currentGroup.messages.push(msg);
    });

    groups.forEach(group => {
      const row = document.createElement('div');
      row.className = `msg-row ${group.isUser ? 'user' : 'ai'}`;
      
      const avatar = document.createElement('div');
      avatar.className = `avatar ${group.isUser ? 'user' : 'ai'}`;
      avatar.textContent = group.isUser ? '👤' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if(group.isUser) {
        const content = document.createElement('div');
        content.className = 'bubble-content';
        content.innerHTML = renderMarkdown(group.messages[0].content);
        bubble.appendChild(content);
      } else {
        group.messages.forEach(msg => {
          if(msg.type === 'reason') {
             bubble.appendChild(createAgentCard(msg));
          } else {
             const resDiv = document.createElement('div');
             resDiv.className = 'result-content markdown-body'; 
             const finalHTML = renderFinalResultContent(msg.rendered || msg.content);
             resDiv.innerHTML = finalHTML;
             bubble.appendChild(resDiv);
          }
        });
      }
      row.appendChild(avatar);
      row.appendChild(bubble);
      dom.chatMessages.appendChild(row);
    });

    if(state.running) {
        const thinkingRow = document.createElement('div');
        thinkingRow.className = 'msg-row ai thinking-indicator-row';
        thinkingRow.innerHTML = `
            <div class="avatar ai">🤖</div>
            <div class="bubble">
                <div class="thinking-bubble">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        dom.chatMessages.appendChild(thinkingRow);
    }

    if(shouldScrollToLatest) {
      dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
    } else {
      dom.chatMessages.scrollTop = Math.min(previousScrollTop, dom.chatMessages.scrollHeight);
    }
    state.pendingRender = false;
  }

  function renderFinalResultContent(text) {
     if(!text) return '';
     return renderMarkdown(text);
  }


  // --- 卡片生成器 ---
  function createAgentCard(msg) {
    const details = document.createElement('details');
    let typeClass = 'type-thought', icon = '💭', title = '思考过程';

    switch(msg.kind) {
      case 'plan': typeClass = 'type-plan'; icon = '🗺️'; title = '计划 (Plan)'; break;
      case 'plan_thought': typeClass = 'type-plan'; icon = '💡'; title = '计划思考 (Thinking)'; break;
      case 'tool_thought': typeClass = 'type-thought'; icon = '🧠'; title = '工具调用思考'; break;
      case 'tool_call': typeClass = 'type-tool'; icon = '🛠️'; title = '正在调用工具'; break;
      case 'task': typeClass = 'type-task'; icon = '⚙️'; title = '运行过程'; break;
      case 'tool_result': typeClass = 'type-tool'; icon = '✅'; title = '工具返回结果'; break;
      case 'file': typeClass = 'type-tool'; icon = '📎'; title = '产物'; break;
      case 'stream': typeClass = 'type-tool'; icon = '📡'; title = '工具输出片段'; break;
      case 'notifications': typeClass = 'type-task'; icon = '🔔'; title = '系统通知'; break;
    }

    if(msg.typeClass) typeClass = msg.typeClass;
    if(msg.icon) icon = msg.icon;
    if(msg.title) title = msg.title;

    details.className = `agent-card ${typeClass}${msg.compact ? ' compact' : ''}`;
    if(msg.isOpen) details.open = true;

    const summary = document.createElement('summary');
