      case 'ppt': case 'file': case 'knowledge': case 'image': case 'browser': case 'code': case 'deep_search': upsertReasonMessage(session, 'tool_result', renderToolResultHTML(getResultMapStr()), ts, false); break;
      
      case 'agent_stream': case 'result':
        const chunk = payload.result || ''; if(!chunk) break;
        if(!streamState.gotAnyResult) {
            session.messages.push({ role: 'assistant', messageType: 'result', content: '' }); 
            streamState.messageIndex = session.messages.length - 1;
            streamState.gotAnyResult = true;
        }
        // 【核心修改】确保是追加模式，支持流式
        streamState.buffer += chunk;
        const msg = session.messages[streamState.messageIndex];
        msg.content = streamState.buffer;
        // 渲染时交给 renderFinalResultContent 处理 Gaia
        msg.rendered = null; // 清空缓存，强制重绘
        if(!state.replaying) renderMessages(true);
        break;
      
      case 'done': onStop(); break;
    }
  }

  async function onSubmit(e){
    e.preventDefault(); if(state.running) return;
    const text = dom.query.value.trim(); if(!text) return;
    const session = getActiveSession();
    session.messages.push({ role: 'user', content: text });
    if(session.messages.length === 1) session.title = text.slice(0, 20);
    dom.query.value = '';
    
    setUIStatus('Agent 思考中...', true);
    renderMessages(true);
    renderSessionList();
    
    state.stream = { sessionId: session.id, buffer: '', messageIndex: null, baseIndex: session.messages.length - 1, lastIndexByKind: {}, gotAnyResult: false };
    controller = new AbortController();

    const contextMessages = session.messages.filter(m => m.role === 'user' || (m.role === 'assistant' && m.messageType === 'result')).map(m => ({ role: m.role, content: m.content }));
    const selectedTools = getSelectedTools();
    const approvedTools = getApprovedTools();
    const payload = { messages: contextMessages, outputStyle: dom.outputStyle.value, mode: dom.mode.value, run_environment: dom.runEnvironment.value, conversation_id: session.id, user_id: dom.userId.value, agent_id: dom.agentId.value };

    try {
       const uploadedFiles = await uploadSelectedFiles(session.id);
       if(uploadedFiles.length && contextMessages.length) {
         contextMessages[contextMessages.length - 1].uploadFile = uploadedFiles;
       }
       if(selectedTools !== null) payload.selected_tools = selectedTools;
       if(approvedTools.length) payload.approved_tools = approvedTools;
       const resp = await fetch(dom.endpoint.value, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal: controller.signal });
       if(!resp.ok) throw new Error(`Server Error: ${resp.status}`);
       const reader = resp.body.getReader(); const decoder = new TextDecoder(); let buffer = '';
       while(true) {
         const { done, value } = await reader.read(); if(done) break;
         buffer += decoder.decode(value, {stream: true});
         let idx;
         while((idx = buffer.indexOf('\n\n')) >= 0) { const chunk = buffer.slice(0, idx); buffer = buffer.slice(idx + 2); const event = parseSSE(chunk); if(event) handleEvent(event); }
       }
    } catch(err) { if(err.name !== 'AbortError') upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">Error: ${err.message}</span>`, Date.now(), false); } 
    finally { setUIStatus('就绪', false); state.stream = null; controller = null; dom.fileInput.value = ''; updateFileSummary(); refreshTaskList(); renderMessages(true); }
  }

  async function onStop() {
    const session = getActiveSession();
    if(session?.taskId) {
      try {
        await fetch(`/agent/tasks/${encodeURIComponent(session.taskId)}/cancel`, { method: 'POST' });
        session.taskStatus = 'cancelled';
        updateTaskMeta(session);
        refreshTaskList();
      } catch(err) {
        upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">取消任务失败：${escapeHTML(err.message)}</span>`, Date.now(), false);
      }
    }
    if(controller) controller.abort();
    setUIStatus('就绪', false);
    renderMessages(true);
  }

  async function sendTaskInput() {
    const session = getActiveSession();
    const content = dom.taskInputText.value.trim();
    if(!session?.taskId || !content) return;
    dom.sendTaskInput.disabled = true;
    try {
      const resp = await fetch(`/agent/tasks/${encodeURIComponent(session.taskId)}/input`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, user_id: dom.userId.value || undefined }),
      });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      dom.taskInputText.value = '';
      await refreshTaskList();
      await loadTask(session.taskId);
    } catch(err) {
      upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">提交补充失败：${escapeHTML(err.message)}</span>`, Date.now(), false);
    } finally {
      updateTaskInputPanel(getActiveSession());
    }
  }

  async function retryTask() {
    const session = getActiveSession();
    if(!session?.taskId || state.running) return;
    dom.retryTask.disabled = true;
    setUIStatus('任务重试中...', true);
    try {
      const resp = await fetch(`/agent/tasks/${encodeURIComponent(session.taskId)}/retry`, { method: 'POST' });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const task = await resp.json();
      const retryTaskId = task.taskId || task.task_id;
      await refreshTaskList();
      if(retryTaskId) await loadTask(retryTaskId);
    } catch(err) {
      upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">重试任务失败：${escapeHTML(err.message)}</span>`, Date.now(), false);
    } finally {
      setUIStatus('就绪', false);
      updateTaskMeta(getActiveSession());
    }
  }

  function setUIStatus(text, running) {
    state.running = running;
    dom.statusText.textContent = text;
    dom.statusDot.className = running ? 'status-dot active' : 'status-dot';
    dom.send.disabled = running;
    dom.stop.disabled = !running;
    const session = getActiveSession();
    if(session?.taskId) updateTaskMeta(session);
  }
  function parseSSE(chunk) {
    const lines = chunk.split('\n'); let event = { type: 'message', json: null, raw: chunk };
    for(const line of lines) {
       if(line.startsWith('event:')) event.type = line.slice(6).trim();
       else if(line.startsWith('data:')) { const data = line.slice(5).trim(); try { event.json = JSON.parse(data); if(event.json.messageType) event.type = event.json.messageType; } catch { event.raw = data; } }
    }
    return event;
  }

  dom.newSession.onclick = () => activateSession(createSession());
  dom.sidebarToggle.onclick = () => dom.sidebar.classList.toggle('open');
  dom.refreshTasks.onclick = refreshTaskList;
  dom.taskKeyword.oninput = scheduleTaskRefresh;
  dom.taskUserFilter.oninput = scheduleTaskRefresh;
  dom.taskStatusFilter.onchange = refreshTaskList;
  dom.taskAgentFilter.onchange = refreshTaskList;
  dom.taskAgentTypeFilter.onchange = refreshTaskList;
  dom.taskCreatedFilter.onchange = refreshTaskList;
  dom.taskDurationFilter.onchange = refreshTaskList;
  dom.taskErrorFilter.onchange = refreshTaskList;
  dom.taskEventTypeFilter.onchange = reloadActiveTaskEvents;
  dom.taskEventSourceFilter.onchange = reloadActiveTaskEvents;
  dom.agentId.onchange = () => { applySelectedAgentDefaults(); renderAgentSummary(); renderToolOptions(); renderEvalOptions(); refreshToolCatalog(); };
  dom.evalCase.onchange = () => { dom.runEval.disabled = !dom.evalCase.value; };
  dom.runEval.onclick = runSelectedEval;
  dom.runAllEvals.onclick = runAllEvals;
  dom.fileInput.onchange = updateFileSummary;
  dom.sendTaskInput.onclick = sendTaskInput;
  dom.retryTask.onclick = retryTask;
  dom.stop.onclick = onStop;
  dom.form.onsubmit = onSubmit;
  dom.query.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSubmit(e); } };
  activateSession(createSession());
  refreshTaskList();
  refreshAgentList();
})();
</script>
</body>
</html>
