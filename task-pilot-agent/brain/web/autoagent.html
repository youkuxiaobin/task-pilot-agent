    summary.className = 'card-header';
    summary.innerHTML = `<span class="card-icon">${icon}</span><span class="card-title">${title}</span><span class="card-time">${formatTime(msg.ts)}</span><span class="card-arrow">▶</span>`;
    details.addEventListener('toggle', () => { msg.isOpen = details.open; });

    const body = document.createElement('div');
    body.className = 'card-body';
    if(msg.kind === 'tool_result') body.classList.add('markdown-body');
    body.innerHTML = msg.html; 

    details.appendChild(summary);
    details.appendChild(body);
    return details;
  }

  function formatTime(ts) { return new Date(ts || Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}); }
  
  function renderMarkdown(text) {
    if(!text) return '';
    try { return purifier.sanitize(markedLib.parse(text)); } 
    catch { return escapeHTML(text).replace(/\n/g, '<br>'); }
  }

  // --- 渲染逻辑 ---
  function renderPlanHTML(plan) {
    let html = '';
    if(plan.title) html += `<h4>${escapeHTML(plan.title)}</h4>`;
    if(plan.steps && Array.isArray(plan.steps)) {
        html += `<ul class="step-list">`;
        plan.steps.forEach((step, idx) => {
            const status = plan.step_status && plan.step_status[idx] ? plan.step_status[idx] : 'pending';
            let icon = '○';
            let statusClass = 'pending';
            if(status === 'completed') { icon = '✅'; statusClass = 'completed'; }
            else if(status === 'failed') { icon = '❌'; statusClass = 'error'; }
            html += `<li class="step-item ${statusClass}"><span class="step-icon">${icon}</span><span>${escapeHTML(step)}</span></li>`;
        });
        html += `</ul>`;
    }
    if(plan.command) html += `<div style="margin-top:0.5rem;font-size:0.85em;opacity:0.8">Command: ${escapeHTML(plan.command)}</div>`;
    return html;
  }

  function renderPlanThoughtHTML(pt) {
    let html = '';
    if(pt.tool_calls && Array.isArray(pt.tool_calls)) {
        pt.tool_calls.forEach(call => {
            const args = call.arguments || {};
            const renderField = (label, val) => {
                if(!val) return '';
                const valStr = (typeof val === 'object') ? JSON.stringify(val, null, 2) : String(val);
                return `<div class="field-block"><span class="field-label">${escapeHTML(label)}</span><div class="field-value">${escapeHTML(valStr)}</div></div>`;
            };
            if(args.command) html += renderField('Command', args.command);
            if(args.summary) html += renderField('Summary', args.summary);
            if(args.current_step) html += renderField('Current Step', args.current_step);
            if(args.rationale) {
                const r = args.rationale; let rText = '';
                if(r.decision) rText += `Decision: ${r.decision}\n`;
                if(r.complexity_score) rText += `Complexity: ${r.complexity_score}\n`;
                if(Array.isArray(r.evidence)) rText += `Evidence:\n${r.evidence.map(e=>'- '+e).join('\n')}`;
                html += renderField('Rationale', rText.trim());
            }
            if(Array.isArray(args.steps)) html += renderField('Steps', args.steps.join('\n'));
        });
    }
    return html;
  }

  function renderToolThoughtHTML(tt) {
    let html = '';
    if(tt.current_step) html += `<div class="field-block"><span class="field-label">Current Step</span><div class="field-value highlight">${escapeHTML(tt.current_step)}</div></div>`;
    if(tt.tool_calls && Array.isArray(tt.tool_calls)) {
        tt.tool_calls.forEach((call, i) => {
            let name, args;
            if(Array.isArray(call)) { name = call[0]; args = call[1]; }
            else { name = call.name || call.tool; args = call.arguments; }
            const argStr = (typeof args === 'string') ? args : JSON.stringify(args, null, 2);
            html += `<div class="field-block"><span class="field-label">Tool Call #${i+1}: ${escapeHTML(name)}</span><div class="field-value">${escapeHTML(argStr)}</div></div>`;
        });
    }
    return html;
  }

  function stringifyToolValue(value) {
    if(value === undefined || value === null) return '';
    if(typeof value === 'string') return value;
    try { return JSON.stringify(value, null, 2); }
    catch { return String(value); }
  }

  function renderFieldBlock(label, value, options={}) {
    const valueText = stringifyToolValue(value);
    if(!valueText) return '';
    const classes = options.highlight ? 'field-value highlight' : 'field-value';
    return `<div class="field-block"><span class="field-label">${escapeHTML(label)}</span><div class="${classes}">${escapeHTML(valueText)}</div></div>`;
  }

  function renderToolOutputHTML(value) {
    if(value === undefined || value === null) return '';
    if(typeof value !== 'string') {
        return renderMarkdown("```json\n" + stringifyToolValue(value) + "\n```");
    }
    const trimmed = value.trim();
    if(trimmed.startsWith('{') || trimmed.startsWith('[')) {
        try {
            const json = JSON.parse(trimmed);
            if(json.isError && Array.isArray(json.content)) {
                const errorText = json.content.map(c => c.text || '').join('');
                return `<div style="color:var(--color-error);font-weight:bold">❌ 执行错误</div><pre style="border-color:var(--color-error)">${escapeHTML(errorText)}</pre>`;
            }
            return renderMarkdown("```json\n" + JSON.stringify(json, null, 2) + "\n```");
        } catch(e) {}
    }
    return renderMarkdown(value);
  }

  function renderToolAuditHTML(raw) {
    if(!raw || typeof raw !== 'object') return '';
    let html = '';
    html += renderFieldBlock('Task ID', raw.taskId);
    html += renderFieldBlock('Agent ID', raw.agentId);
    html += renderFieldBlock('User ID', raw.userId);
    html += renderFieldBlock('Request ID', raw.requestId);
    html += renderFieldBlock('Run ID', raw.runId);
    html += renderFieldBlock('Session ID', raw.sessionId);
    html += renderFieldBlock('Run Environment', raw.runEnvironment);
    html += renderFieldBlock('Work Dir', raw.workDir);
    html += renderFieldBlock('Started At', raw.startedAt);
    html += renderFieldBlock('Completed At', raw.completedAt);
    html += renderFieldBlock('Arguments Summary', raw.argumentsSummary);
    return html;
  }

  function renderTechnicalDetailsHTML(raw) {
    const audit = renderToolAuditHTML(raw);
    if(!audit) return '';
    return `<details class="technical-details"><summary>查看技术细节</summary>${audit}</details>`;
  }

  function toolCardTitle(kind, raw) {
    const toolName = compactToolName(raw?.tool || raw?.name || raw?.tool_name || '');
    if(kind === 'tool_call') return `调用工具${toolName ? `：${toolName}` : ''}`;
    const failed = raw?.failed === true || !!raw?.error;
    const duration = raw?.durationMs !== undefined ? ` · ${raw.durationMs}ms` : '';
    return `${failed ? '工具失败' : '工具完成'}${toolName ? `：${toolName}` : ''}${duration}`;
  }

  function renderToolCallHTML(raw) {
    if(!raw) return '';
    const toolName = raw.tool || raw.name || raw.tool_name || '';
    const args = raw.arguments || raw.input || raw.args || {};
    let html = '';
    html += renderFieldBlock('Tool', toolName, {highlight: true});
    html += renderFieldBlock('Arguments', raw.argumentsSummary || args);
    html += renderTechnicalDetailsHTML(raw);
    return html || renderToolOutputHTML(raw);
  }

  function renderToolResultHTML(raw) {
    if(!raw) return '';
    if(typeof raw === 'object') {
        const toolName = raw.tool || raw.name || raw.tool_name || '';
        const args = raw.arguments || raw.input || raw.args;
        const result = raw.result !== undefined ? raw.result : (raw.output !== undefined ? raw.output : raw.chunk);
        let html = '';
        html += renderFieldBlock('Tool', toolName, {highlight: true});
        if(raw.failed === true) html += renderFieldBlock('Status', raw.error || 'failed', {highlight: true});
        if(raw.durationMs !== undefined) html += renderFieldBlock('Duration', `${raw.durationMs} ms`);
        html += renderFieldBlock('Arguments', raw.argumentsSummary || args);
        if(raw.resultSummary && result === undefined) html += renderFieldBlock('Result Summary', raw.resultSummary);
        if(result !== undefined) {
            html += `<div class="field-block"><span class="field-label">Result</span><div class="field-value markdown-body">${renderToolOutputHTML(result)}</div></div>`;
            html += renderTechnicalDetailsHTML(raw);
            return html;
        }
        html += renderTechnicalDetailsHTML(raw);
        return html || renderToolOutputHTML(raw);
    }
    return renderToolOutputHTML(raw);
  }

  function renderNotificationHTML(taskStr) {
    let msg = taskStr;
    try { const jsonStr = taskStr.replace(/'/g, '"'); const obj = JSON.parse(jsonStr); if(obj.process_message) msg = obj.process_message; } catch {}
    return `<div style="display:flex;align-items:center;gap:0.5rem"><span>ℹ️</span> <span>${escapeHTML(msg)}</span></div>`;
  }

  // --- SSE Logic ---
  function upsertReasonMessage(session, kind, html, ts, replaceable, options={}) {
    if(PROCESS_HIDDEN_IN_CHAT.has(kind)) return;
    const streamState = getBuildState(session);
    if(replaceable) {
       const idx = streamState.lastIndexByKind[kind];
       if(idx !== undefined && idx > streamState.baseIndex) {
         session.messages[idx].html = html; session.messages[idx].ts = ts;
         if(options.title) session.messages[idx].title = options.title;
         if(options.icon) session.messages[idx].icon = options.icon;
         if(!state.replaying) renderMessages(true);
         return;
       }
    }
    const msg = {
      role: 'assistant',
      type: 'reason',
      kind,
      html,
      ts,
      isOpen: options.isOpen === true,
      title: options.title,
      icon: options.icon,
      typeClass: options.typeClass,
      compact: options.compact !== false,
    };
    session.messages.push(msg);
    streamState.lastIndexByKind[kind] = session.messages.length - 1;
    if(!state.replaying) renderMessages(true);
  }

  function handleEvent(event) {
    const session = getActiveSession(); if(!session) return;
    applyEventToSession(session, event);
  }

  function applyEventToSession(session, event) {
    const payload = event.json || {};
    const ts = Number(payload.messageTime || event.time) || Date.now();
    const getResultMap = () => payload.resultMap || {};
    const getResultMapStr = () => { if(payload.resultMap && payload.resultMap.result) return payload.resultMap.result; return ''; };
    const streamState = getBuildState(session);

    if(payload.agentSnapshot && typeof payload.agentSnapshot === 'object') {
      session.agentSnapshot = payload.agentSnapshot;
      updateTaskMeta(session);
    }

    if(payload.taskId) {
      session.taskId = payload.taskId;
      session.taskStatus = payload.finish ? 'completed' : (session.taskStatus || 'running');
      if(payload.agentId) session.taskAgentId = payload.agentId;
      if(payload.mode) session.taskMode = payload.mode;
      if(payload.runEnvironment) session.runEnvironment = payload.runEnvironment;
      state.activeTaskId = payload.taskId;
      updateTaskMeta(session);
      renderSessionList();
      renderTaskList();
    }

    if(['tool_call', 'tool_result', 'result', 'done'].includes(event.type)) { delete streamState.lastIndexByKind['plan_thought']; delete streamState.lastIndexByKind['plan']; }

    switch(event.type) {
      case 'plan': if(payload.plan) upsertReasonMessage(session, 'plan', renderPlanHTML(payload.plan), ts, true, { title: payload.plan.title ? `计划：${payload.plan.title}` : '计划', icon: '🗺️', typeClass: 'type-plan', compact: true }); break;
      case 'plan_thought': if(payload.planThought) upsertReasonMessage(session, 'plan_thought', renderPlanThoughtHTML(payload.planThought), ts, true); break;
      case 'tool_thought': if(payload.toolThought) upsertReasonMessage(session, 'tool_thought', renderToolThoughtHTML(payload.toolThought), ts, false); break;
      case 'tool_call': {
        const raw = getResultMap();
        upsertReasonMessage(session, 'tool_call', renderToolCallHTML(raw), ts, false, { title: toolCardTitle('tool_call', raw), icon: '🛠️', typeClass: 'type-tool', compact: true });
        break;
      }
      case 'tool_result': {
        const raw = getResultMap();
        upsertReasonMessage(session, 'tool_result', renderToolResultHTML(raw), ts, false, { title: toolCardTitle('tool_result', raw), icon: raw.failed === true ? '⚠️' : '✅', typeClass: raw.failed === true ? 'type-task' : 'type-tool', compact: true, isOpen: raw.failed === true });
        break;
      }
      case 'stream': upsertReasonMessage(session, 'stream', renderToolResultHTML(getResultMap()), ts, true); break;
      case 'agent_phase': {
        const data = payload.resultMap || {};
        if(data.status === 'failed' || data.error) {
          const text = taskLifecycleText('agent_phase', payload);
          upsertReasonMessage(session, 'task', renderMarkdown(text), ts, false, { title: text, icon: '⚠️', typeClass: 'type-task', isOpen: true });
        }
        break;
      }
      case 'task':
        if(payload.task && !isLowSignalTaskText(payload.task)) {
          upsertReasonMessage(session, 'task', renderMarkdown(payload.task), ts, false, { title: payload.task, icon: '⚙️', typeClass: 'type-task', compact: true });
        }
        break;
      case 'notifications': if(payload.task) upsertReasonMessage(session, 'notifications', renderNotificationHTML(payload.task), ts, false, { title: '系统通知', icon: '🔔', typeClass: 'type-task', isOpen: String(payload.task).includes('失败') || String(payload.task).includes('Error') }); break;
      case 'ppt': case 'file': case 'knowledge': case 'image': case 'browser': case 'code': case 'deep_search': upsertReasonMessage(session, 'tool_result', renderToolResultHTML(getResultMapStr()), ts, false, { title: '工具产出', icon: '✅', typeClass: 'type-tool', compact: true }); break;
      
      case 'agent_stream': case 'result':
        const chunk = payload.result || ''; if(!chunk) break;
        if(!streamState.gotAnyResult) {
            session.messages.push({ role: 'assistant', messageType: 'result', content: '' }); 
            streamState.messageIndex = session.messages.length - 1;
            streamState.gotAnyResult = true;
        }
        // 【核心修改】确保是追加模式，支持流式
        streamState.buffer += chunk;
        const msg = session.messages[streamState.messageIndex];
        msg.content = streamState.buffer;
        // 清空渲染缓存，下一帧按最新结果重绘
        msg.rendered = null; // 清空缓存，强制重绘
        if(!state.replaying) renderMessages(true);
        break;
      
      case 'done': onStop(); break;
    }
  }

  async function onSubmit(e){
    e.preventDefault(); if(state.running) return;
    const text = dom.query.value.trim(); if(!text) return;
    const session = getActiveSession();
    session.messages.push({ role: 'user', content: text });
    if(session.messages.length === 1) session.title = text.slice(0, 20);
    dom.query.value = '';
    
    setUIStatus('Agent 思考中...', true);
    renderMessages(true);
    renderSessionList();
    
    state.stream = { sessionId: session.id, buffer: '', messageIndex: null, baseIndex: session.messages.length - 1, lastIndexByKind: {}, gotAnyResult: false };
    controller = new AbortController();

    const contextMessages = session.messages.filter(m => m.role === 'user' || (m.role === 'assistant' && m.messageType === 'result')).map(m => ({ role: m.role, content: m.content }));
    const payload = {
      messages: contextMessages,
      conversation_id: session.id,
      agent_id: dom.agentId.value || undefined,
    };

    try {
       const resp = await fetch(dom.endpoint.value, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal: controller.signal });
       if(!resp.ok) throw new Error(`Server Error: ${resp.status}`);
       const reader = resp.body.getReader(); const decoder = new TextDecoder(); let buffer = '';
       while(true) {
         const { done, value } = await reader.read(); if(done) break;
         buffer += decoder.decode(value, {stream: true});
         let idx;
         while((idx = buffer.indexOf('\n\n')) >= 0) { const chunk = buffer.slice(0, idx); buffer = buffer.slice(idx + 2); const event = parseSSE(chunk); if(event) handleEvent(event); }
       }
    } catch(err) { if(err.name !== 'AbortError') upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">Error: ${err.message}</span>`, Date.now(), false); } 
    finally { setUIStatus('就绪', false); state.stream = null; controller = null; refreshTaskList(); renderMessages(true); }
  }

  async function onStop() {
    const session = getActiveSession();
    if(session?.taskId) {
      try {
        await fetch(`/agent/tasks/${encodeURIComponent(session.taskId)}/cancel`, { method: 'POST' });
        session.taskStatus = 'cancelled';
        updateTaskMeta(session);
        refreshTaskList();
      } catch(err) {
        upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">取消运行失败：${escapeHTML(err.message)}</span>`, Date.now(), false);
      }
    }
    if(controller) controller.abort();
    setUIStatus('就绪', false);
    renderMessages(true);
  }

  async function sendTaskInput() {
    const session = getActiveSession();
    const content = dom.taskInputText.value.trim();
    if(!session?.taskId || !content) return;
    dom.sendTaskInput.disabled = true;
    try {
      const resp = await fetch(`/agent/tasks/${encodeURIComponent(session.taskId)}/input`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, user_id: dom.userId.value || undefined }),
      });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      dom.taskInputText.value = '';
      await refreshTaskList();
      await loadTask(session.taskId);
    } catch(err) {
      upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">提交补充失败：${escapeHTML(err.message)}</span>`, Date.now(), false);
    } finally {
      updateTaskInputPanel(getActiveSession());
    }
  }

  async function retryTask() {
    const session = getActiveSession();
    if(!session?.taskId || state.running) return;
    dom.retryTask.disabled = true;
    setUIStatus('运行重试中...', true);
    try {
      const resp = await fetch(`/agent/tasks/${encodeURIComponent(session.taskId)}/retry`, { method: 'POST' });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const task = await resp.json();
      const retryTaskId = task.taskId || task.task_id;
      await refreshTaskList();
      if(retryTaskId) await loadTask(retryTaskId);
    } catch(err) {
      upsertReasonMessage(session, 'notifications', `<span style="color:#ef4444">重试运行失败：${escapeHTML(err.message)}</span>`, Date.now(), false);
    } finally {
      setUIStatus('就绪', false);
      updateTaskMeta(getActiveSession());
    }
  }

  function setUIStatus(text, running) {
    state.running = running;
    dom.statusText.textContent = text;
    dom.statusDot.className = running ? 'status-dot active' : 'status-dot';
    dom.send.disabled = running;
    dom.stop.disabled = !running;
    const session = getActiveSession();
    if(session?.taskId) updateTaskMeta(session);
  }
  function parseSSE(chunk) {
    const lines = chunk.split('\n'); let event = { type: 'message', json: null, raw: chunk };
    for(const line of lines) {
       if(line.startsWith('event:')) event.type = line.slice(6).trim();
       else if(line.startsWith('data:')) { const data = line.slice(5).trim(); try { event.json = JSON.parse(data); if(event.json.messageType) event.type = event.json.messageType; } catch { event.raw = data; } }
    }
    return event;
  }

  dom.newSession.onclick = () => activateSession(createSession());
  dom.sidebarToggle.onclick = () => dom.sidebar.classList.toggle('open');
  dom.refreshTasks.onclick = refreshTaskList;
  dom.taskKeyword.oninput = scheduleTaskRefresh;
  dom.taskUserFilter.oninput = scheduleTaskRefresh;
  dom.taskStatusFilter.onchange = refreshTaskList;
  dom.taskAgentFilter.onchange = refreshTaskList;
  dom.taskAgentTypeFilter.onchange = refreshTaskList;
  dom.taskCreatedFilter.onchange = refreshTaskList;
  dom.taskDurationFilter.onchange = refreshTaskList;
  dom.taskErrorFilter.onchange = refreshTaskList;
  dom.taskEventTypeFilter.onchange = reloadActiveTaskEvents;
  dom.taskEventSourceFilter.onchange = reloadActiveTaskEvents;
  dom.agentId.onchange = () => { applySelectedAgentDefaults(); renderAgentSummary(); };
  dom.evalCase.onchange = () => { dom.runEval.disabled = !dom.evalCase.value; };
  dom.runEval.onclick = runSelectedEval;
  dom.runAllEvals.onclick = runAllEvals;
  dom.fileInput.onchange = updateFileSummary;
  dom.sendTaskInput.onclick = sendTaskInput;
  dom.retryTask.onclick = retryTask;
  dom.stop.onclick = onStop;
  dom.form.onsubmit = onSubmit;
  dom.query.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSubmit(e); } };
  dom.chatMessages.addEventListener('scroll', () => { state.followLatest = isChatNearBottom(); });
  dom.chatMessages.addEventListener('wheel', markUserReading, { passive: true });
  dom.chatMessages.addEventListener('touchstart', markUserReading, { passive: true });
  dom.chatMessages.addEventListener('mousedown', markUserReading);
  document.addEventListener('selectionchange', () => {
    if(!hasChatTextSelection() && state.pendingRender) renderMessages(false);
  });
  activateSession(createSession());
  refreshTaskList();
  refreshAgentList();
})();
</script>
</body>
